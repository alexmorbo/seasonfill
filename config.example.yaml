log:
  level: ${LOG_LEVEL:-info}
  format: json

http:
  bind: ":8080"
  read_timeout: 15s
  write_timeout: 30s
  idle_timeout: 60s
  shutdown_timeout: 10s
  auth:
    enabled: true
    api_key: ${SEASONFILL_API_KEY}

cron:
  enabled: true
  schedule: "0 */6 * * *"
  on_start: false
  jitter: 1m

database:
  driver: ${DB_DRIVER:-sqlite}
  sqlite:
    path: ${SQLITE_PATH:-./data/seasonfill.db}
  postgres:
    dsn: ${POSTGRES_DSN}
    max_open_conns: 10
    max_idle_conns: 5
    conn_max_lifetime: 5m

# Global default. Each instance can override via sonarr_instances[N].dry_run.
dry_run: false

scan:
  shutdown_grace: 60s
  cooldown_sweep: 15m

sonarr_instances:
  - name: sonarr-main
    url: ${SONARR_MAIN_URL}
    api_key: ${SONARR_MAIN_API_KEY}
    timeout: 30s
    # Optional per-instance override of the global dry_run. Instance wins.
    # dry_run: false
    tags:
      mode: all
      include: []
      exclude: []
    search:
      require_all_aired: false
      skip_specials: true
      skip_anime: true
      min_custom_format_score: 0
    ranking:
      indexer_priority_enabled: true
      origin_bonus: 1.0
    limits:
      scan_max_series: 100
      max_grabs_per_scan: 10
    rate_limit:
      rps: 5
      burst: 10
    cooldown:
      mode: smart
      series_after_grab: 24h
      guid_after_failed_grab: 72h
    retry:
      max_attempts: 3
      initial_backoff: 1s
      max_backoff: 30s
