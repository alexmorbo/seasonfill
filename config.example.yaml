log:
  level: ${LOG_LEVEL:-info}
  format: json

http:
  bind: ":8080"
  read_timeout: 15s
  write_timeout: 30s
  idle_timeout: 60s
  shutdown_timeout: 10s
  auth:
    enabled: true
    api_key: ${SEASONFILL_API_KEY}
    # Cookie lifetime. Default 12h.
    session_ttl: 12h
    # Admin username. Phase 7 ships single-user only.
    web_user: ${SEASONFILL_WEB_USER:-admin}
    # ONE OF the two below — never both. Empty + empty DB triggers
    # the first-run auto-generated password flow (printed once at WARN).
    web_password: ${SEASONFILL_WEB_PASSWORD}
    web_password_hash: ${SEASONFILL_WEB_PASSWORD_HASH}
    # Secure cookie flag — true ONLY when serving over HTTPS.
    # Browsers refuse Secure cookies over plain HTTP, so leave false
    # for http://localhost dev.
    secure_cookie: ${SEASONFILL_AUTH_SECURE_COOKIE}
    # CIDRs/IPs whose X-Forwarded-For we trust when resolving the
    # client IP (used by login + webhook rate limits). Default is
    # ["127.0.0.1", "::1"] — only localhost trusted. Add your
    # ingress/proxy CIDR if you terminate TLS in front of seasonfill.
    # Empty list disables XFF entirely (uses RemoteAddr).
    trusted_proxies:
      - "127.0.0.1"
      - "::1"

cron:
  enabled: true
  schedule: "0 */6 * * *"
  on_start: false
  jitter: 1m

database:
  driver: ${DB_DRIVER:-sqlite}
  sqlite:
    path: ${SQLITE_PATH:-./data/seasonfill.db}
  postgres:
    dsn: ${POSTGRES_DSN}
    max_open_conns: 10
    max_idle_conns: 5
    conn_max_lifetime: 5m

# WARN: dry_run defaults to TRUE in code so a freshly-pulled image does NOT
# issue real grabs without explicit opt-in. Setting `dry_run: false` enables
# real POST /api/v3/release calls to Sonarr — verify decisions in your logs
# (or the `decisions` DB table) look correct before flipping this. Each
# instance can override via `sonarr_instances[N].dry_run`; instance wins.
dry_run: false

scan:
  shutdown_grace: 60s
  cooldown_sweep: 15m

# Cross-instance protection — applies AFTER each per-instance rate_limit.
# Set both to 0 to disable (nil limiter — unlimited).
global_rate_limit:
  rpm: 30
  burst: 10

sonarr_instances:
  - name: sonarr-main
    url: ${SONARR_MAIN_URL}
    api_key: ${SONARR_MAIN_API_KEY}
    # Applies to every Sonarr API call EXCEPT release search.
    # Default 10s — fast enough for health-check fail-fast on
    # /api/v3/system/status, slow enough for routine listings.
    timeout: 10s
    # Applies ONLY to GET /api/v3/release (interactive indexer
    # search). Sonarr resolves this via Prowlarr → indexers; slow
    # indexers (e.g. RuTracker) routinely take 20-45s. Default
    # `timeout * 6` (= 60s on a 10s base). Bump if you see
    # `error_fetch_releases` with error_detail `context deadline
    # exceeded` in /scans/:id.
    search_timeout: 60s
    # Optional per-instance override of the global dry_run. Instance wins.
    # dry_run: false
    tags:
      mode: all
      include: []
      exclude: []
    search:
      require_all_aired: false
      skip_specials: true
      skip_anime: true
      min_custom_format_score: 0
    ranking:
      indexer_priority_enabled: true
      origin_bonus: 1.0
    limits:
      scan_max_series: 100
      max_grabs_per_scan: 10
    rate_limit:
      rps: 5
      burst: 10
    cooldown:
      mode: smart
      series_after_grab: 24h
      guid_after_failed_grab: 72h
      guid_after_failed_import: 48h
    retry:
      max_attempts: 3
      initial_backoff: 1s
      max_backoff: 30s
    health_check:
      recheck_interval_auth: 5m
      recheck_interval_network: 1m
