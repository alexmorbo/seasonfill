components:
  schemas:
    dto.AuthConfigDTO:
      properties:
        local_bypass:
          example: false
          type: boolean
        login_url:
          description: |-
            LoginURL is set when mode=oidc — points at the public /auth/oidc/start
            endpoint. Empty string for other modes.
          example: /api/v1/auth/oidc/start
          type: string
        mode:
          example: forms
          type: string
      type: object
    dto.Decision:
      properties:
        candidates_count:
          type: integer
        category:
          enum:
          - all_complete
          - sonarr_handles
          - action_taken
          - blocked
          - nothing_found
          - error
          - unknown
          example: action_taken
          type: string
        created_at:
          type: string
        decision:
          enum:
          - grab
          - skip
          - blocked_cooldown
          - already_optimal
          - expired
          - error
          example: grab
          type: string
        dry_run_would_grab:
          type: boolean
        error_detail:
          example: 'sonarr: 503 service unavailable'
          type: string
        existing_count:
          type: integer
        id:
          example: dec_001
          type: string
        instance:
          example: alpha
          type: string
        missing_count:
          type: integer
        reason:
          example: upgrade_available
          type: string
        releases_found:
          type: integer
        scan_run_id:
          type: string
        season_number:
          type: integer
        selected_guid:
          type: string
        series_id:
          type: integer
        series_title:
          example: Severance
          type: string
        superseded_by_id:
          example: 7b3d4a92-1234-4abc-9def-000000000005
          type: string
      type: object
    dto.DecisionList:
      properties:
        items:
          items:
            $ref: '#/components/schemas/dto.Decision'
          type: array
          uniqueItems: false
        next_cursor:
          type: string
      type: object
    dto.ErrorResponse:
      properties:
        code:
          example: UNAUTHORIZED
          type: string
        error:
          example: unauthorized
          type: string
      type: object
    dto.Grab:
      properties:
        attempts:
          type: integer
        coverage_count:
          type: integer
        created_at:
          type: string
        custom_format_score:
          type: integer
        error_message:
          type: string
        id:
          example: grb_001
          type: string
        indexer_id:
          type: integer
        indexer_name:
          example: tracker.x
          type: string
        instance:
          example: alpha
          type: string
        quality:
          example: WEBDL-1080p
          type: string
        release_guid:
          type: string
        release_title:
          type: string
        scan_run_id:
          type: string
        season_number:
          type: integer
        series_id:
          type: integer
        series_title:
          example: Severance
          type: string
        status:
          enum:
          - grabbed
          - imported
          - import_failed
          - grab_failed
          - expired
          example: imported
          type: string
        updated_at:
          type: string
      type: object
    dto.GrabList:
      properties:
        items:
          items:
            $ref: '#/components/schemas/dto.Grab'
          type: array
          uniqueItems: false
        next_cursor:
          type: string
      type: object
    dto.HealthStatus:
      properties:
        status:
          example: ok
          type: string
      type: object
    dto.Instance:
      properties:
        health:
          enum:
          - Available
          - UnavailableAuth
          - UnavailableNetwork
          - UnavailableUnknown
          example: Available
          type: string
        last_check_at:
          type: string
        last_error:
          type: string
        mode:
          enum:
          - auto
          - manual
          example: auto
          type: string
        name:
          example: alpha
          type: string
        transitions_count:
          type: integer
        url:
          example: http://sonarr:8989
          type: string
      type: object
    dto.InstanceCooldown:
      properties:
        guid_after_failed_grab_sec:
          type: integer
        guid_after_failed_import_sec:
          type: integer
        mode:
          enum:
          - smart
          - strict
          type: string
        series_after_grab_sec:
          type: integer
      type: object
    dto.InstanceCreateRequest:
      properties:
        api_key:
          example: abcd...
          type: string
        cooldown:
          $ref: '#/components/schemas/dto.InstanceCooldown'
        dry_run:
          type: boolean
        health_check:
          $ref: '#/components/schemas/dto.InstanceHealthCheck'
        limits:
          $ref: '#/components/schemas/dto.InstanceLimits'
        mode:
          example: auto
          type: string
        name:
          example: alpha
          type: string
        ranking:
          $ref: '#/components/schemas/dto.InstanceRanking'
        rate_limit_burst:
          type: integer
        rate_limit_rpm:
          type: integer
        retry:
          $ref: '#/components/schemas/dto.InstanceRetry'
        search:
          $ref: '#/components/schemas/dto.InstanceSearch'
        search_timeout_sec:
          type: integer
        tags:
          $ref: '#/components/schemas/dto.InstanceTags'
        timeout_sec:
          type: integer
        url:
          example: http://sonarr:8989
          type: string
      type: object
    dto.InstanceDetail:
      properties:
        api_key:
          example: '***'
          type: string
        cooldown:
          $ref: '#/components/schemas/dto.InstanceCooldown'
        dry_run:
          type: boolean
        health_check:
          $ref: '#/components/schemas/dto.InstanceHealthCheck'
        limits:
          $ref: '#/components/schemas/dto.InstanceLimits'
        mode:
          enum:
          - auto
          - manual
          example: auto
          type: string
        name:
          example: alpha
          type: string
        ranking:
          $ref: '#/components/schemas/dto.InstanceRanking'
        rate_limit_burst:
          type: integer
        rate_limit_rpm:
          type: integer
        retry:
          $ref: '#/components/schemas/dto.InstanceRetry'
        search:
          $ref: '#/components/schemas/dto.InstanceSearch'
        search_timeout_sec:
          type: integer
        tags:
          $ref: '#/components/schemas/dto.InstanceTags'
        timeout_sec:
          type: integer
        updated_at:
          type: string
        url:
          example: http://sonarr:8989
          type: string
      type: object
    dto.InstanceHealthCheck:
      properties:
        recheck_auth_sec:
          type: integer
        recheck_network_sec:
          type: integer
      type: object
    dto.InstanceLimits:
      properties:
        max_grabs_per_scan:
          type: integer
        scan_max_series:
          type: integer
      type: object
    dto.InstanceList:
      properties:
        instances:
          items:
            $ref: '#/components/schemas/dto.Instance'
          type: array
          uniqueItems: false
      type: object
    dto.InstanceRanking:
      properties:
        indexer_priority_enabled:
          type: boolean
        origin_bonus:
          type: number
      type: object
    dto.InstanceRetry:
      properties:
        initial_backoff_sec:
          type: integer
        max_attempts:
          type: integer
        max_backoff_sec:
          type: integer
      type: object
    dto.InstanceSearch:
      properties:
        min_custom_format_score:
          type: integer
        require_all_aired:
          type: boolean
        skip_anime:
          type: boolean
        skip_specials:
          type: boolean
      type: object
    dto.InstanceTags:
      properties:
        exclude:
          items:
            type: string
          type: array
          uniqueItems: false
        include:
          items:
            type: string
          type: array
          uniqueItems: false
        mode:
          enum:
          - include
          - exclude
          - "off"
          example: include
          type: string
      type: object
    dto.InstanceTestRequest:
      properties:
        api_key:
          example: abcd...
          type: string
        url:
          example: http://sonarr:8989
          type: string
      type: object
    dto.InstanceTestResponse:
      properties:
        ok:
          type: boolean
        reason:
          type: string
        version:
          type: string
      type: object
    dto.InstanceUpdateRequest:
      properties:
        api_key:
          example: abcd...
          type: string
        cooldown:
          $ref: '#/components/schemas/dto.InstanceCooldown'
        dry_run:
          type: boolean
        health_check:
          $ref: '#/components/schemas/dto.InstanceHealthCheck'
        limits:
          $ref: '#/components/schemas/dto.InstanceLimits'
        mode:
          example: auto
          type: string
        name:
          example: alpha
          type: string
        ranking:
          $ref: '#/components/schemas/dto.InstanceRanking'
        rate_limit_burst:
          type: integer
        rate_limit_rpm:
          type: integer
        retry:
          $ref: '#/components/schemas/dto.InstanceRetry'
        search:
          $ref: '#/components/schemas/dto.InstanceSearch'
        search_timeout_sec:
          type: integer
        tags:
          $ref: '#/components/schemas/dto.InstanceTags'
        timeout_sec:
          type: integer
        url:
          example: http://sonarr:8989
          type: string
      type: object
    dto.LoginRequest:
      properties:
        password:
          example: hunter2
          type: string
        username:
          example: admin
          type: string
      type: object
    dto.MissingSeasonStat:
      properties:
        missing_aired_count:
          type: integer
        season_number:
          type: integer
      type: object
    dto.MissingSeries:
      properties:
        monitored:
          example: true
          type: boolean
        seasons:
          items:
            $ref: '#/components/schemas/dto.MissingSeasonStat'
          type: array
          uniqueItems: false
        series_id:
          example: 122
          type: integer
        title:
          example: Severance
          type: string
        total_missing_aired:
          type: integer
      type: object
    dto.MissingSeriesList:
      properties:
        items:
          items:
            $ref: '#/components/schemas/dto.MissingSeries'
          type: array
          uniqueItems: false
        total:
          type: integer
      type: object
    dto.OKResponse:
      properties:
        ok:
          example: true
          type: boolean
      type: object
    dto.PasswordChangeRequest:
      properties:
        current:
          example: hunter22
          type: string
        new:
          example: NewSecretLongEnough
          type: string
      type: object
    dto.ReadyStatus:
      properties:
        database:
          example: true
          type: boolean
        status:
          enum:
          - ok
          - unavailable
          example: ok
          type: string
      type: object
    dto.RuntimeAuthDTO:
      properties:
        local_bypass:
          description: LocalBypass enables the local-address bypass middleware (036c).
          type: boolean
        local_networks:
          description: LocalNetworks is the CIDR allow-list driving local-bypass.
          example:
          - 127.0.0.0/8
          - 10.0.0.0/8
          items:
            type: string
          type: array
          uniqueItems: false
        mode:
          description: Mode is one of "forms" | "basic" | "none" | "oidc". Default
            "forms".
          example: forms
          type: string
        oidc:
          $ref: '#/components/schemas/dto.RuntimeOIDCDTO'
        secure_cookie:
          type: boolean
        session_epoch:
          description: |-
            SessionEpoch is read-only — the server bumps it whenever any
            auth-invalidating field changes. PUT bodies that include it are
            silently ignored (the usecase manages the value).
          example: 0
          type: integer
        session_ttl:
          example: 12h
          type: string
        trusted_proxies:
          example:
          - 127.0.0.1
          - ::1
          items:
            type: string
          type: array
          uniqueItems: false
      type: object
    dto.RuntimeConfigDTO:
      properties:
        auth:
          $ref: '#/components/schemas/dto.RuntimeAuthDTO'
        auto_generated_api_key:
          example: false
          type: boolean
        cron:
          $ref: '#/components/schemas/dto.RuntimeCronDTO'
        dry_run:
          type: boolean
        global_rate_limit:
          $ref: '#/components/schemas/dto.RuntimeRateLimitDTO'
        scan:
          $ref: '#/components/schemas/dto.RuntimeScanDTO'
        updated_at:
          type: string
      type: object
    dto.RuntimeCronDTO:
      properties:
        enabled:
          type: boolean
        jitter:
          example: 1m
          type: string
        on_start:
          type: boolean
        schedule:
          example: 0 */6 * * *
          type: string
      type: object
    dto.RuntimeOIDCDTO:
      properties:
        allowed_groups:
          example:
          - admins
          items:
            type: string
          type: array
          uniqueItems: false
        client_id:
          example: seasonfill
          type: string
        issuer:
          example: https://keycloak.example.com/realms/homelab
          type: string
        redirect_url:
          example: https://seasonfill.example.com/api/v1/auth/oidc/callback
          type: string
        scopes:
          example:
          - openid
          - profile
          - email
          items:
            type: string
          type: array
          uniqueItems: false
        username_claim:
          example: preferred_username
          type: string
      type: object
    dto.RuntimeRateLimitDTO:
      properties:
        burst:
          example: 10
          type: integer
        rpm:
          example: 30
          type: integer
      type: object
    dto.RuntimeScanDTO:
      properties:
        cooldown_sweep:
          example: 15m
          type: string
        shutdown_grace:
          example: 60s
          type: string
      type: object
    dto.Scan:
      properties:
        candidates_found:
          type: integer
        created_at:
          type: string
        dry_run:
          type: boolean
        error_message:
          type: string
        errors_count:
          type: integer
        finished_at:
          type: string
        grabs_failed:
          type: integer
        grabs_performed:
          type: integer
        id:
          example: 7b3d4a92-1234-4abc-9def-000000000001
          type: string
        instance:
          example: alpha
          type: string
        series_scanned:
          type: integer
        started_at:
          type: string
        status:
          enum:
          - running
          - completed
          - failed
          - aborted
          - cancelled
          example: completed
          type: string
        trigger:
          enum:
          - cron
          - manual
          - webhook
          example: cron
          type: string
      type: object
    dto.ScanConflictResponse:
      properties:
        code:
          example: SCAN_IN_PROGRESS
          type: string
        error:
          example: scan already running
          type: string
        instance:
          example: alpha
          type: string
      type: object
    dto.ScanList:
      properties:
        items:
          items:
            $ref: '#/components/schemas/dto.Scan'
          type: array
          uniqueItems: false
        next_cursor:
          type: string
      type: object
    dto.ScanNotFoundResponse:
      properties:
        error:
          example: unknown instance
          type: string
        instance:
          example: alpha
          type: string
      type: object
    dto.ScanTriggerItem:
      properties:
        candidates_found:
          type: integer
        errors:
          type: integer
        finished_at:
          type: string
        instance:
          example: alpha
          type: string
        scan_run_id:
          example: 7b3d4a92-1234-4abc-9def-000000000001
          type: string
        series_scanned:
          type: integer
        started_at:
          type: string
        status:
          enum:
          - completed
          - failed
          - running
          - aborted
          - cancelled
          example: completed
          type: string
      type: object
    dto.ScanTriggerRequest:
      properties:
        dry_run:
          type: boolean
        instance:
          example: alpha
          type: string
        series_ids:
          items:
            type: integer
          type: array
          uniqueItems: false
      type: object
    dto.SeriesSearchItem:
      properties:
        missing_aired_count:
          example: 8
          type: integer
        monitored:
          example: true
          type: boolean
        season_count:
          example: 2
          type: integer
        series_id:
          example: 122
          type: integer
        title:
          example: Severance
          type: string
      type: object
    dto.SeriesSearchList:
      properties:
        items:
          items:
            $ref: '#/components/schemas/dto.SeriesSearchItem'
          type: array
          uniqueItems: false
        total:
          example: 142
          type: integer
      type: object
    dto.SessionResponse:
      properties:
        auto_generated:
          example: false
          type: boolean
        ok:
          example: true
          type: boolean
        username:
          example: admin
          type: string
      type: object
  securitySchemes:
    ApiKeyAuth:
      in: cookie
      name: seasonfill_session
      type: apiKey
externalDocs:
  description: ""
  url: ""
info:
  description: |-
    REST API for seasonfill — Sonarr season-fill orchestration.
    Routes accept either X-Api-Key header or a signed
    seasonfill_session cookie issued by POST /api/v1/auth/login.
  title: Seasonfill API
  version: "1.0"
openapi: 3.1.0
paths:
  /auth/config:
    get:
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.AuthConfigDTO'
          description: OK
      summary: Public auth-mode bootstrap
      tags:
      - auth
  /auth/login:
    post:
      description: |-
        Validates username + password. On success sets HttpOnly
        seasonfill_session cookie and returns 200.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/dto.LoginRequest'
        description: Username and password
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.OKResponse'
          description: OK
          headers:
            Set-Cookie:
              description: HttpOnly session cookie
              schema:
                type: string
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Unauthorized
        "429":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Too Many Requests
      summary: Authenticate and issue a session cookie
      tags:
      - auth
  /auth/oidc/callback:
    get:
      parameters:
      - description: authorization code
        in: query
        name: code
        required: true
        schema:
          type: string
      - description: echoed state
        in: query
        name: state
        required: true
        schema:
          type: string
      responses:
        "302":
          description: Found
      summary: OIDC callback
      tags:
      - auth
  /auth/oidc/start:
    get:
      parameters:
      - description: same-origin path to return to after login
        in: query
        name: next
        schema:
          type: string
      responses:
        "302":
          description: Found
      summary: OIDC start
      tags:
      - auth
  /auth/password:
    post:
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/dto.PasswordChangeRequest'
        description: Current + new password
        required: true
      responses:
        "204":
          description: No Content
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Unauthorized
      security:
      - CookieAuth: []
      - ApiKeyAuth: []
      summary: Change the admin password
      tags:
      - auth
  /auth/session:
    delete:
      responses:
        "204":
          description: No Content
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Unauthorized
      security:
      - CookieAuth: []
      - ApiKeyAuth: []
      summary: Clear the session cookie
      tags:
      - auth
    get:
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.SessionResponse'
          description: OK
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Unauthorized
      security:
      - CookieAuth: []
      - ApiKeyAuth: []
      summary: Verify the current session
      tags:
      - auth
  /config/runtime:
    get:
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.RuntimeConfigDTO'
          description: OK
          headers:
            Last-Modified:
              description: RFC1123 of updated_at
              schema:
                type: string
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Unauthorized
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Internal Server Error
      security:
      - CookieAuth: []
      - ApiKeyAuth: []
      summary: Get runtime configuration
      tags:
      - config
    put:
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/dto.RuntimeConfigDTO'
        description: Runtime config
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.RuntimeConfigDTO'
          description: OK
          headers:
            Last-Modified:
              description: RFC1123 of updated_at
              schema:
                type: string
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Unauthorized
        "412":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Precondition Failed
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Internal Server Error
      security:
      - CookieAuth: []
      - ApiKeyAuth: []
      summary: Update runtime configuration
      tags:
      - config
  /decisions:
    get:
      parameters:
      - description: Page size (default 50, max 200)
        in: query
        name: limit
        schema:
          type: integer
      - description: Opaque next_cursor
        in: query
        name: cursor
        schema:
          type: string
      - description: Filter by instance
        in: query
        name: instance
        schema:
          type: string
      - description: Filter by parent scan_run UUID
        in: query
        name: scan_run_id
        schema:
          type: string
      - description: Filter by series ID
        in: query
        name: series_id
        schema:
          type: integer
      - description: Filter by season
        in: query
        name: season_number
        schema:
          type: integer
      - description: Filter by outcome
        in: query
        name: decision
        schema:
          enum:
          - grab
          - skip
          - blocked_cooldown
          - already_optimal
          - expired
          - error
          type: string
      - description: RFC3339 lower bound
        in: query
        name: from
        schema:
          type: string
      - description: RFC3339 upper bound
        in: query
        name: to
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.DecisionList'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Bad Request
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Internal Server Error
      security:
      - CookieAuth: []
      - ApiKeyAuth: []
      summary: List decisions
      tags:
      - decisions
  /decisions/{id}/grab:
    post:
      description: |-
        Explicit-confirm path that bypasses global dry_run for
        one decision. Idempotent on (instance, series, season,
        release_guid). Eligible only when decision == "grab",
        selected_guid != "" and dry_run_would_grab == true.
      parameters:
      - description: Decision UUID
        in: path
        name: id
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.Grab'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Bad Request
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Not Found
        "409":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Conflict
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Internal Server Error
        "502":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Bad Gateway
      security:
      - CookieAuth: []
      - ApiKeyAuth: []
      summary: Grab the release the decision selected
      tags:
      - decisions
  /decisions/{id}/rescan:
    post:
      description: |-
        Asynchronously re-evaluates (instance, series, season).
        Bypasses GUID cooldowns. Returns 202 immediately with a
        fresh scan_run_id; the goroutine writes the new decision
        and marks the original superseded. 409 if the original
        already produced a grab_records row or if another scan
        is running on the same instance.
      parameters:
      - description: Decision UUID
        in: path
        name: id
        required: true
        schema:
          type: string
      responses:
        "202":
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/dto.ScanTriggerItem'
                type: array
          description: Accepted
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: invalid id
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: decision or instance not found
        "409":
          content:
            application/json:
              schema:
                oneOf:
                - $ref: '#/components/schemas/dto.ScanConflictResponse'
                - $ref: '#/components/schemas/dto.ErrorResponse'
          description: decision already superseded or already executed
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Internal Server Error
      security:
      - CookieAuth: []
      - ApiKeyAuth: []
      summary: Rescan a single decision
      tags:
      - decisions
  /grabs:
    get:
      parameters:
      - description: Page size (default 50, max 200)
        in: query
        name: limit
        schema:
          type: integer
      - description: Opaque next_cursor
        in: query
        name: cursor
        schema:
          type: string
      - description: Filter by instance
        in: query
        name: instance
        schema:
          type: string
      - description: Filter by series ID
        in: query
        name: series_id
        schema:
          type: integer
      - description: Filter by season
        in: query
        name: season_number
        schema:
          type: integer
      - description: Filter by status
        in: query
        name: status
        schema:
          enum:
          - grabbed
          - imported
          - import_failed
          - grab_failed
          - expired
          type: string
      - description: RFC3339 lower bound
        in: query
        name: from
        schema:
          type: string
      - description: RFC3339 upper bound
        in: query
        name: to
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.GrabList'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Bad Request
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Internal Server Error
      security:
      - CookieAuth: []
      - ApiKeyAuth: []
      summary: List grabs
      tags:
      - grabs
  /healthz:
    get:
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.HealthStatus'
          description: OK
      summary: Liveness probe
      tags:
      - health
  /instances:
    get:
      description: Latest snapshot from the in-memory checker.
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.InstanceList'
          description: OK
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Unauthorized
      security:
      - CookieAuth: []
      - ApiKeyAuth: []
      summary: List Sonarr instance health
      tags:
      - instances
    post:
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/dto.InstanceCreateRequest'
        description: Instance fields
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.InstanceDetail'
          description: Created
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Bad Request
        "409":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Conflict
      security:
      - CookieAuth: []
      - ApiKeyAuth: []
      summary: Create a Sonarr instance
      tags:
      - instances
  /instances/{name}:
    delete:
      parameters:
      - description: Instance name
        in: path
        name: name
        required: true
        schema:
          type: string
      responses:
        "204":
          description: No Content
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Unauthorized
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Not Found
      security:
      - CookieAuth: []
      - ApiKeyAuth: []
      summary: Delete a Sonarr instance and its history
      tags:
      - instances
    get:
      parameters:
      - description: Instance name
        in: path
        name: name
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.InstanceDetail'
          description: OK
          headers:
            Last-Modified:
              description: RFC1123 of updated_at
              schema:
                type: string
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Unauthorized
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Not Found
      security:
      - CookieAuth: []
      - ApiKeyAuth: []
      summary: Get one Sonarr instance (masked)
      tags:
      - instances
    put:
      parameters:
      - description: Instance name
        in: path
        name: name
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/dto.InstanceUpdateRequest'
        description: Instance fields
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.InstanceDetail'
          description: OK
          headers:
            Last-Modified:
              description: RFC1123 of updated_at
              schema:
                type: string
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Bad Request
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Not Found
        "412":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Precondition Failed
      security:
      - CookieAuth: []
      - ApiKeyAuth: []
      summary: Update a Sonarr instance
      tags:
      - instances
  /instances/{name}/missing:
    get:
      description: |-
        Monitored series whose aired episode count exceeds
        the on-disk file count, with per-season breakdown.
      parameters:
      - description: Instance name
        in: path
        name: name
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.MissingSeriesList'
          description: OK
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Unauthorized
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Not Found
        "502":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Bad Gateway
      security:
      - CookieAuth: []
      - ApiKeyAuth: []
      summary: List missing-aired series for an instance
      tags:
      - instances
  /instances/{name}/series:
    get:
      description: |-
        Title-substring search with monitored filter. Returns
        a trimmed picker-specific DTO (series_id, title,
        monitored, season_count, missing_aired_count). `total`
        is the pre-limit count; clients narrow by typing more
        rather than paginating.
      parameters:
      - description: Instance name
        in: path
        name: name
        required: true
        schema:
          type: string
      - description: Title substring (case-insensitive)
        in: query
        name: q
        schema:
          type: string
      - description: true | false | any (default any)
        in: query
        name: monitored
        schema:
          enum:
          - "true"
          - "false"
          - any
          type: string
      - description: 1..100 (default 30)
        in: query
        name: limit
        schema:
          type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.SeriesSearchList'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Unauthorized
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Not Found
        "502":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Bad Gateway
      security:
      - CookieAuth: []
      - ApiKeyAuth: []
      summary: Search series in a Sonarr instance
      tags:
      - instances
  /instances/test:
    post:
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/dto.InstanceTestRequest'
        description: URL and api_key to probe
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.InstanceTestResponse'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Bad Request
        "429":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Too Many Requests
        "504":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Gateway Timeout
      security:
      - CookieAuth: []
      - ApiKeyAuth: []
      summary: Probe a Sonarr instance for reachability/auth
      tags:
      - instances
  /readyz:
    get:
      description: |-
        200 when pod-local dependencies (DB) are healthy.
        External Sonarr health is reported via /api/v1/instances.
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ReadyStatus'
          description: OK
        "503":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ReadyStatus'
          description: Service Unavailable
      summary: Readiness probe
      tags:
      - health
  /scan:
    post:
      description: |-
        Asynchronously schedules a scan across all configured
        instances or the named one. Returns 202 immediately
        with status="running"; clients poll /scans/{id} for
        live progress (series_scanned increments mid-scan).
        Optional `series_ids` narrows a per-instance scan;
        unknown IDs are silently dropped with a WARN.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/dto.ScanTriggerRequest'
        description: Optional instance + series filter
      responses:
        "202":
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/dto.ScanTriggerItem'
                type: array
          description: Accepted
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ScanNotFoundResponse'
          description: Not Found
        "409":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ScanConflictResponse'
          description: SCAN_IN_PROGRESS
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Internal Server Error
      security:
      - CookieAuth: []
      - ApiKeyAuth: []
      summary: Trigger a manual scan
      tags:
      - scans
  /scans:
    get:
      description: Keyset-paginated, newest first.
      parameters:
      - description: Page size (default 50, max 200)
        in: query
        name: limit
        schema:
          type: integer
      - description: Opaque next_cursor
        in: query
        name: cursor
        schema:
          type: string
      - description: Filter by instance
        in: query
        name: instance
        schema:
          type: string
      - description: Filter by status
        in: query
        name: status
        schema:
          enum:
          - running
          - completed
          - failed
          - aborted
          type: string
      - description: RFC3339 lower bound
        in: query
        name: from
        schema:
          type: string
      - description: RFC3339 upper bound (exclusive)
        in: query
        name: to
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ScanList'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Bad Request
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Internal Server Error
      security:
      - CookieAuth: []
      - ApiKeyAuth: []
      summary: List scans
      tags:
      - scans
  /scans/{id}:
    get:
      parameters:
      - description: Scan run UUID
        in: path
        name: id
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.Scan'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Bad Request
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Not Found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Internal Server Error
      security:
      - CookieAuth: []
      - ApiKeyAuth: []
      summary: Get scan by ID
      tags:
      - scans
  /scans/{id}/cancel:
    post:
      description: |-
        Signals cancellation of the named scan run. The goroutine
        observes the signal at the next ctx.Err() checkpoint and
        finalises with status="cancelled". Already-collected
        decisions are kept; already-issued grabs are NOT undone.
      parameters:
      - description: Scan run UUID
        in: path
        name: id
        required: true
        schema:
          type: string
      responses:
        "202":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.OKResponse'
          description: Accepted
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: invalid id
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: scan not running
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Internal Server Error
      security:
      - CookieAuth: []
      - ApiKeyAuth: []
      summary: Cancel a running scan
      tags:
      - scans
servers:
- description: Primary API base path
  url: /api/v1
