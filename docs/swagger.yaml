components:
  schemas:
    auth.CheckDiscovery:
      properties:
        discovered_issuer:
          type: string
        error:
          type: string
        ok:
          type: boolean
      type: object
    auth.CheckIssuerMatch:
      properties:
        expected:
          type: string
        got:
          type: string
        ok:
          type: boolean
      type: object
    auth.CheckJWKS:
      properties:
        error:
          type: string
        keys:
          type: integer
        ok:
          type: boolean
      type: object
    auth.CheckTokenEndpoint:
      properties:
        error:
          type: string
        ok:
          type: boolean
        url:
          type: string
      type: object
    auth.OIDCTestResult:
      properties:
        discovery:
          $ref: '#/components/schemas/auth.CheckDiscovery'
        issuer_match:
          $ref: '#/components/schemas/auth.CheckIssuerMatch'
        jwks:
          $ref: '#/components/schemas/auth.CheckJWKS'
        token_endpoint:
          $ref: '#/components/schemas/auth.CheckTokenEndpoint'
      type: object
    dto.AuthConfigDTO:
      properties:
        local_bypass:
          example: false
          type: boolean
        login_url:
          example: /api/v1/auth/oidc/start
          type: string
        mode:
          example: forms
          type: string
        oidc_ready:
          description: |-
            OIDCReady mirrors middleware.OIDCRuntime.IsReady(). When true,
            LoginURL is also populated — SPA renders SSO button regardless of mode.
          example: false
          type: boolean
      type: object
    dto.CastMember:
      properties:
        character_name:
          type: string
        credit_order:
          type: integer
        episode_count:
          type: integer
        name:
          type: string
        person_id:
          type: integer
        profile_asset:
          type: string
        tmdb_person_id:
          type: integer
      type: object
    dto.CastPageMember:
      properties:
        character_name:
          description: |-
            CharacterName is the role on this series. nil when the
            TMDB credit carries no character (rare for kind=cast).
          type: string
        credit_order:
          description: |-
            CreditOrder is the TMDB billing order. nil when TMDB didn't
            emit one; the composer sorts NULLS LAST.
          type: integer
        episode_count:
          description: |-
            EpisodeCount is the number of episodes this person appeared
            in on this series (TMDB aggregate_credits[*].
            total_episode_count). nil when TMDB returned no count.
            The frontend derives Main / Recurring / Guest by comparing
            against TotalEpisodeCount.
          type: integer
        in_library:
          description: |-
            InLibrary is true when the person appears as cast or crew
            on at least one OTHER series in this seasonfill's library
            (any active series_cache row, any instance). Excludes the
            current series so the "what else are they in?" affordance
            doesn't render a self-link.
          type: boolean
        name:
          description: |-
            Name is the person's display name (locale-independent —
            TMDB doesn't translate names reliably, PRD §5.3 row
            "people").
          example: Pedro Pascal
          type: string
        person_id:
          description: |-
            PersonID is the canon people.id. Frontend uses it for the
            /person/:tmdbId link (resolved via TMDBID where present).
          type: integer
        profile_asset:
          description: |-
            ProfileAsset is the media_assets.hash for the person's
            profile photo. nil when the person has no profile_path
            (frontend renders a monogram placeholder).
          type: string
        tmdb_id:
          description: |-
            TMDBID is the TMDB person id. nil when the person was
            onboarded from a non-TMDB source (rare; today every cast
            member comes from TMDB aggregate_credits).
          type: integer
      type: object
    dto.ContentRatingBadge:
      description: |-
        ContentRating is the displayed age-rating badge. nil when no
        content_ratings row matches the user locale OR en-US OR US
        fallback.
      properties:
        country_code:
          example: US
          type: string
        rating:
          example: TV-MA
          type: string
      type: object
    dto.CounterBucketDTO:
      properties:
        date:
          type: string
        fails:
          type: integer
        grabs:
          type: integer
        imports:
          type: integer
      type: object
    dto.CounterTotals:
      properties:
        fails:
          type: integer
        grabs:
          type: integer
        imports:
          type: integer
      type: object
    dto.CountersAggregateDTO:
      properties:
        items:
          items:
            $ref: '#/components/schemas/dto.InstanceCountersDTO'
          type: array
          uniqueItems: false
      type: object
    dto.CrewPageMember:
      properties:
        department:
          description: |-
            Department is the TMDB department classification
            ("Production", "Writing", "Directing", "Editorial", ...).
            nil when TMDB didn't emit one.
          type: string
        episode_count:
          description: |-
            EpisodeCount as on CastPageMember; semantics identical
            (per-(person, job) aggregate count).
          type: integer
        in_library:
          type: boolean
        job:
          description: |-
            Job is the TMDB job title within the department
            ("Executive Producer", "Director", "Writer"). nil when
            missing. One person with multiple jobs on the same series
            produces multiple CrewPageMember entries with the same
            PersonID but distinct Job values — frontend dedupes
            visually per design brief §3.4 (top-2 jobs joined by ·,
            rest in tooltip).
          type: string
        name:
          type: string
        person_id:
          type: integer
        profile_asset:
          type: string
        tmdb_id:
          type: integer
      type: object
    dto.Decision:
      properties:
        aired_episodes:
          example: 8
          type: integer
        candidates_count:
          type: integer
        category:
          enum:
          - all_complete
          - sonarr_handles
          - action_taken
          - blocked
          - nothing_found
          - error
          - unknown
          example: action_taken
          type: string
        created_at:
          type: string
        decision:
          enum:
          - grab
          - skip
          - blocked_cooldown
          - already_optimal
          - expired
          - error
          example: grab
          type: string
        dry_run_would_grab:
          type: boolean
        error_detail:
          example: 'sonarr: 503 service unavailable'
          type: string
        existing_count:
          type: integer
        existing_episodes:
          example: 3
          type: integer
        grabbed_episodes:
          example: 5
          type: integer
        id:
          example: dec_001
          type: string
        instance:
          example: alpha
          type: string
        intent:
          $ref: '#/components/schemas/dto.DecisionIntent'
        missing_count:
          type: integer
        reason:
          example: upgrade_available
          type: string
        releases_found:
          type: integer
        scan_run_id:
          type: string
        season_number:
          type: integer
        selected_guid:
          type: string
        series_id:
          type: integer
        series_title:
          example: Severance
          type: string
        superseded_by_id:
          example: 7b3d4a92-1234-4abc-9def-000000000005
          type: string
        total_episodes:
          example: 10
          type: integer
      type: object
    dto.DecisionIntent:
      description: |-
        Intent surfaces the "why this grab" payload from the Decision
        row that produced this grab (091a / F-P2-2). The audit handler
        resolves the Decision lazily by (scan_run_id, instance, series,
        season) at read time and copies the Intent here so GrabDrawer
        can render "Почему этот грабе" without a second round-trip.
        nil when no matching Decision was found OR the Decision itself
        carried no intent (pre-091a rows, error decisions).
      properties:
        chosen_because:
          enum:
          - only_candidate
          - highest_score
          - first_pass_quality
          - watchdog_better_quality
          - watchdog_better_dub
          - watchdog_better_other
          - watchdog_replay_unregistered
          - watchdog_replay_already_added
          - watchdog_replay_error
          - manual_selection
          example: highest_score
          type: string
        chosen_reason_detail:
          example: score 88 vs alternates 64, 71
          type: string
        had_episodes:
          example:
          - 1
          - 2
          - 3
          - 4
          - 5
          - 6
          - 7
          - 8
          - 9
          items:
            type: integer
          type: array
          uniqueItems: false
        target_episodes:
          example:
          - 10
          - 11
          items:
            type: integer
          type: array
          uniqueItems: false
      type: object
    dto.DecisionList:
      properties:
        items:
          items:
            $ref: '#/components/schemas/dto.Decision'
          type: array
          uniqueItems: false
        next_cursor:
          type: string
      type: object
    dto.DownloadChip:
      description: |-
        Download is the single active in-flight Sonarr queue item, if
        any. nil when the queue is empty OR Sonarr is unreachable
        (then degraded[] includes "sonarr").
      properties:
        download_id:
          type: string
        episode_id:
          type: integer
        protocol:
          example: torrent
          type: string
        queue_id:
          type: integer
        season_number:
          type: integer
        status:
          example: downloading
          type: string
        title:
          type: string
      type: object
    dto.Episode:
      properties:
        air_date:
          type: string
        episode_number:
          type: integer
        finale_type:
          type: string
        has_file:
          type: boolean
        monitored:
          type: boolean
        overview:
          type: string
        overview_language:
          type: string
        quality:
          type: string
        runtime_minutes:
          type: integer
        size_bytes:
          type: integer
        sonarr_episode_id:
          type: integer
        still_asset:
          type: string
        title:
          type: string
        title_language:
          type: string
      type: object
    dto.EpisodeFileDetail:
      properties:
        episode_numbers:
          example:
          - 1
          - 2
          items:
            type: integer
          type: array
          uniqueItems: false
        id:
          example: 7001
          type: integer
        quality:
          example: WEBDL-2160p
          type: string
        relative_path:
          example: Season 02/Severance.S02E01.mkv
          type: string
        season_number:
          example: 2
          type: integer
        size_bytes:
          example: 13325829734
          type: integer
      type: object
    dto.EpisodeFileList:
      properties:
        items:
          items:
            $ref: '#/components/schemas/dto.EpisodeFileDetail'
          type: array
          uniqueItems: false
      type: object
    dto.ErrorResponse:
      properties:
        code:
          example: UNAUTHORIZED
          type: string
        error:
          example: unauthorized
          type: string
      type: object
    dto.ExternalLinks:
      description: |-
        ExternalLinks is the IMDb / TMDB / TVDB / homepage footer row.
        Always present (struct is never nil); inner fields are
        individually nil when the corresponding id is missing.
      properties:
        homepage:
          type: string
        imdb_id:
          example: tt0903747
          type: string
        tmdb_id:
          example: 1396
          type: integer
        tvdb_id:
          example: 81189
          type: integer
      type: object
    dto.ExternalServiceDTO:
      properties:
        api_key_configured:
          type: boolean
        api_key_masked:
          example: '****abcd'
          type: string
        enabled:
          type: boolean
        last_test_at:
          type: string
        last_test_message:
          type: string
        last_test_outcome:
          example: ok
          type: string
        proxy_auth_set:
          type: boolean
        proxy_host:
          example: proxy.example.com:1080
          type: string
        proxy_scheme:
          example: socks5
          type: string
        proxy_url_set:
          type: boolean
        service:
          example: tmdb
          type: string
      type: object
    dto.ExternalServiceListResponse:
      properties:
        services:
          items:
            $ref: '#/components/schemas/dto.ExternalServiceDTO'
          type: array
          uniqueItems: false
      type: object
    dto.ExternalServiceTestResponse:
      properties:
        latency_ms:
          type: integer
        message:
          type: string
        outcome:
          example: ok
          type: string
      type: object
    dto.ExternalServiceUpsertRequest:
      properties:
        api_key:
          type: string
        enabled:
          type: boolean
        proxy_password:
          type: string
        proxy_url:
          type: string
        proxy_username:
          type: string
      type: object
    dto.GUIDRewriteDTO:
      properties:
        from:
          example: http://rutracker-proxy.servarr.svc.cluster.local
          type: string
        to:
          example: https://rutracker.org
          type: string
      type: object
    dto.Grab:
      properties:
        attempts:
          type: integer
        coverage_count:
          type: integer
        created_at:
          type: string
        custom_format_score:
          type: integer
        error_message:
          type: string
        id:
          example: grb_001
          type: string
        indexer_id:
          type: integer
        indexer_name:
          example: tracker.x
          type: string
        instance:
          example: alpha
          type: string
        intent:
          $ref: '#/components/schemas/dto.DecisionIntent'
        parsed:
          $ref: '#/components/schemas/dto.GrabParsed'
        parsed_at:
          description: |-
            ParsedAt is the wall-clock at which Sonarr parsed the release
            title. Always emitted alongside a non-null Parsed; omitted when
            Parsed is null.
          type: string
        quality:
          example: WEBDL-1080p
          type: string
        release_guid:
          type: string
        release_title:
          type: string
        replay_kind:
          description: |-
            ReplayKind classifies a replay row relative to its parent
            (F-P2-3). Derived server-side at read time from Parsed/Quality
            on both sides. Empty / "primary" (omitted from wire) means this
            row is not a replay or has no comparable axis. "replay_quality"
            = better resolution / codec / HDR than parent. "replay_dub" =
            gained a dub track the parent did not have. "replay_other" =
            replay row but no parsed-axis improvement detected (parent
            off-page, parent unparsed, or no axis differs).
          enum:
          - replay_quality
          - replay_dub
          - replay_other
          example: replay_quality
          type: string
        replay_of_id:
          description: |-
            ReplayOfID — uuid of the original row this row re-grabs.
            Populated by the Watchdog regrab path (039f-2); nil for scan /
            rescan / manual paths. Omitted when nil.
          example: 7b3d4a92-1234-4abc-9def-000000000003
          type: string
        replayed_by:
          description: |-
            ReplayedBy — uuids of newer grab_records rows that re-grab THIS
            row (reverse of replay_of_id). Derived at read time by the
            audit handler — a single batched SELECT covers the page. Capped
            at ports.MaxReplaysPerParent (50); SPA renders "+N more" past
            that. Empty slice omitted from wire.
          items:
            type: string
          type: array
          uniqueItems: false
        scan_run_id:
          type: string
        season_number:
          type: integer
        series_id:
          type: integer
        series_title:
          example: Severance
          type: string
        size_bytes:
          description: |-
            SizeBytes — release size in bytes (Sonarr OnGrab `release.size`
            or manual-grab `releaseDTO.size`). Omitted when nil; SPA
            renders "—" for missing values.
          example: 13325829734
          type: integer
        status:
          enum:
          - grabbed
          - imported
          - import_failed
          - grab_failed
          - expired
          example: imported
          type: string
        title_slug:
          description: |-
            TitleSlug is the authoritative Sonarr slug for this grab's
            series, joined at read time from series_cache on
            (instance_name, series_id). The FE deep-links into Sonarr
            using this value when present; absence falls the SPA back to
            its client-side slugifier (lossy for `&`, apostrophes, and
            year disambiguation). Omitted from wire when empty — pre-116
            rows and rows whose series_cache row is absent emit no key,
            keeping the audit handler test snapshots untouched. Mirrors
            the 041g pattern on dto.MissingSeries.TitleSlug.
          example: your-friends-and-neighbors
          type: string
        torrent_hash:
          description: |-
            TorrentHash — qBit info-hash (40-char lowercase hex) captured
            by the OnGrab webhook (Phase 10) or stamped at force-grab time.
            Omitted from wire when nil so pre-Phase-10 rows stay clean.
          example: 0123456789abcdef0123456789abcdef01234567
          type: string
        updated_at:
          type: string
      type: object
    dto.GrabList:
      properties:
        items:
          items:
            $ref: '#/components/schemas/dto.Grab'
          type: array
          uniqueItems: false
        next_cursor:
          type: string
      type: object
    dto.GrabParsed:
      description: |-
        Parsed carries the Sonarr /api/v3/parse projection captured by
        the OnGrab webhook in 044b. Nullable — pre-B2 rows and rows whose
        parse call failed both emit `null`. The SPA Grabs page chip set
        degrades to "no parsed" on null.
      properties:
        codec:
          example: HEVC
          type: string
        dub:
          example: Original
          type: string
        hdr_flags:
          example:
          - HDR10+
          - DV
          items:
            type: string
          type: array
          uniqueItems: false
        languages:
          example:
          - Russian
          - English
          items:
            type: string
          type: array
          uniqueItems: false
        quality:
          example: WEBDL-2160p
          type: string
        release_group:
          example: NTb
          type: string
        resolution:
          example: 2160
          type: integer
        source:
          example: WEB-DL
          type: string
        subs:
          example:
          - RUS
          items:
            type: string
          type: array
          uniqueItems: false
      type: object
    dto.HealthStatus:
      properties:
        status:
          example: ok
          type: string
      type: object
    dto.Instance:
      properties:
        health:
          enum:
          - Available
          - SelfThrottled
          - UnavailableAuth
          - UnavailableNetwork
          - UnavailableUnknown
          example: Available
          type: string
        last_check_at:
          type: string
        last_error:
          type: string
        mode:
          enum:
          - auto
          - manual
          example: auto
          type: string
        name:
          example: alpha
          type: string
        public_url:
          example: https://sonarr.example.com
          type: string
        transitions_count:
          type: integer
        url:
          example: http://sonarr:8989
          type: string
      type: object
    dto.InstanceCooldown:
      properties:
        guid_after_failed_grab_sec:
          type: integer
        guid_after_failed_import_sec:
          type: integer
        mode:
          enum:
          - smart
          - strict
          type: string
        series_after_grab_sec:
          type: integer
      type: object
    dto.InstanceCountersDTO:
      properties:
        avg_grabs_7d:
          example: 9.5
          type: number
        instance_name:
          example: homelab
          type: string
        sparkline:
          items:
            $ref: '#/components/schemas/dto.CounterBucketDTO'
          type: array
          uniqueItems: false
        totals:
          $ref: '#/components/schemas/dto.CounterTotals'
        window:
          enum:
          - 24h
          - 7d
          - 30d
          example: 24h
          type: string
      type: object
    dto.InstanceCreateRequest:
      properties:
        api_key:
          example: abcd...
          type: string
        cooldown:
          $ref: '#/components/schemas/dto.InstanceCooldown'
        dry_run:
          type: boolean
        health_check:
          $ref: '#/components/schemas/dto.InstanceHealthCheck'
        limits:
          $ref: '#/components/schemas/dto.InstanceLimits'
        mode:
          example: auto
          type: string
        name:
          example: alpha
          type: string
        parse_on_grab_enabled:
          description: |-
            ParseOnGrabEnabled — pointer so omitted is distinguishable from
            explicit false. Omitted/null defaults to true.
          example: true
          type: boolean
        public_url:
          description: |-
            PublicURL — optional browser-facing URL. Omitted/null = no
            override. Empty string is rejected at the application layer with
            INVALID_INSTANCE_PUBLIC_URL so a client cannot accidentally
            downgrade the override into a silent no-op.
          example: https://sonarr.example.com
          type: string
        ranking:
          $ref: '#/components/schemas/dto.InstanceRanking'
        rate_limit_burst:
          type: integer
        rate_limit_rpm:
          type: integer
        retry:
          $ref: '#/components/schemas/dto.InstanceRetry'
        scan_skip_handled_seasons:
          description: |-
            ScanSkipHandledSeasons — pointer so omitted is distinguishable
            from explicit false. Omitted/null defaults to true (matches the
            046b migration default). Concrete false disables the scan
            pre-filter for this instance, forcing every monitored season through
            the full evaluator.
          example: true
          type: boolean
        search:
          $ref: '#/components/schemas/dto.InstanceSearch'
        search_timeout_sec:
          type: integer
        tags:
          $ref: '#/components/schemas/dto.InstanceTags'
        timeout_sec:
          type: integer
        url:
          example: http://sonarr:8989
          type: string
        webhook_install_enabled:
          description: |-
            WebhookInstallEnabled — pointer so omitted is distinguishable
            from explicit `false`. Omitted/null defaults to true (matches the
            migration default). Concrete false explicitly disables the 041c
            reconciler.
          example: true
          type: boolean
        webhook_url_override:
          description: |-
            WebhookURLOverride — optional base URL for the auto-installed
            Sonarr webhook. Omitted/null = use derived public URL from
            runtime config. Empty-string rejected as for PublicURL.
          example: https://seasonfill.example.com
          type: string
      type: object
    dto.InstanceDetail:
      properties:
        api_key:
          example: '***'
          type: string
        cooldown:
          $ref: '#/components/schemas/dto.InstanceCooldown'
        dry_run:
          type: boolean
        health_check:
          $ref: '#/components/schemas/dto.InstanceHealthCheck'
        limits:
          $ref: '#/components/schemas/dto.InstanceLimits'
        mode:
          enum:
          - auto
          - manual
          example: auto
          type: string
        name:
          example: alpha
          type: string
        parse_on_grab_enabled:
          description: |-
            ParseOnGrabEnabled toggles the 044b parse-on-OnGrab hook. Always
            emitted as a concrete bool; defaults to true on fresh rows.
          example: true
          type: boolean
        public_url:
          description: |-
            PublicURL is the optional browser-facing URL (D64). Always
            emitted; the JSON value is `null` when no override is stored.
          example: https://sonarr.example.com
          type: string
        ranking:
          $ref: '#/components/schemas/dto.InstanceRanking'
        rate_limit_burst:
          type: integer
        rate_limit_rpm:
          type: integer
        retry:
          $ref: '#/components/schemas/dto.InstanceRetry'
        scan_skip_handled_seasons:
          description: |-
            ScanSkipHandledSeasons toggles the 046b scan pre-filter. Always
            emitted as a concrete bool; defaults to true on fresh rows. When
            true, scans skip seasons that Sonarr already handles (complete OR
            nothing-on-disk-and-aired). When false, every monitored season
            goes through the full evaluator (regression guard).
          example: true
          type: boolean
        search:
          $ref: '#/components/schemas/dto.InstanceSearch'
        search_timeout_sec:
          type: integer
        tags:
          $ref: '#/components/schemas/dto.InstanceTags'
        timeout_sec:
          type: integer
        ui_url:
          description: |-
            UIURL is the derived browser-facing URL the SPA links to. Equals
            PublicURL when set, otherwise URL. Always emitted as a non-empty
            string so the SPA never has to compute the fallback itself.
          example: https://sonarr.example.com
          type: string
        updated_at:
          type: string
        url:
          example: http://sonarr:8989
          type: string
        webhook_install_enabled:
          description: |-
            WebhookInstallEnabled toggles the 041c reconciler (D65). Always
            emitted as a concrete bool; defaults to true on fresh rows.
          example: true
          type: boolean
        webhook_url_override:
          description: |-
            WebhookURLOverride is the optional base URL for the auto-installed
            Sonarr webhook (D65). Always emitted; `null` when unset.
          example: https://seasonfill.example.com
          type: string
      type: object
    dto.InstanceHealthCheck:
      properties:
        recheck_auth_sec:
          type: integer
        recheck_network_sec:
          type: integer
      type: object
    dto.InstanceLimits:
      properties:
        max_grabs_per_scan:
          type: integer
