          type: string
      type: object
  securitySchemes:
    ApiKeyAuth:
      in: cookie
      name: seasonfill_session
      type: apiKey
externalDocs:
  description: ""
  url: ""
info:
  description: |-
    REST API for seasonfill — Sonarr season-fill orchestration.
    Routes accept either X-Api-Key header or a signed
    seasonfill_session cookie issued by POST /api/v1/auth/login.
  title: Seasonfill API
  version: "1.0"
openapi: 3.1.0
paths:
  /auth/config:
    get:
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.AuthConfigDTO'
          description: OK
      summary: Public auth-mode bootstrap
      tags:
      - auth
  /auth/login:
    post:
      description: |-
        Validates username + password. On success sets HttpOnly
        seasonfill_session cookie and returns 200.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/dto.LoginRequest'
        description: Username and password
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.OKResponse'
          description: OK
          headers:
            Set-Cookie:
              description: HttpOnly session cookie
              schema:
                type: string
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Unauthorized
        "429":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Too Many Requests
      summary: Authenticate and issue a session cookie
      tags:
      - auth
  /auth/oidc/callback:
    get:
      parameters:
      - description: authorization code
        in: query
        name: code
        required: true
        schema:
          type: string
      - description: echoed state
        in: query
        name: state
        required: true
        schema:
          type: string
      responses:
        "302":
          description: Found
      summary: OIDC callback
      tags:
      - auth
  /auth/oidc/start:
    get:
      parameters:
      - description: same-origin path to return to after login
        in: query
        name: next
        schema:
          type: string
      responses:
        "302":
          description: Found
      summary: OIDC start
      tags:
      - auth
  /auth/oidc/test:
    post:
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/auth.OIDCTestResult'
          description: OK
      summary: OIDC reachability test
      tags:
      - auth
  /auth/password:
    post:
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/dto.PasswordChangeRequest'
        description: Current + new password
        required: true
      responses:
        "204":
          description: No Content
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Unauthorized
      security:
      - CookieAuth: []
      - ApiKeyAuth: []
      summary: Change the admin password
      tags:
      - auth
  /auth/session:
    delete:
      responses:
        "204":
          description: No Content
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Unauthorized
      security:
      - CookieAuth: []
      - ApiKeyAuth: []
      summary: Clear the session cookie
      tags:
      - auth
    get:
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.SessionResponse'
          description: OK
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Unauthorized
      security:
      - CookieAuth: []
      - ApiKeyAuth: []
      summary: Verify the current session
      tags:
      - auth
  /config/runtime:
    get:
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.RuntimeConfigDTO'
          description: OK
          headers:
            Last-Modified:
              description: RFC1123 of updated_at
              schema:
                type: string
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Unauthorized
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Internal Server Error
      security:
      - CookieAuth: []
      - ApiKeyAuth: []
      summary: Get runtime configuration
      tags:
      - config
    put:
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/dto.RuntimeConfigDTO'
        description: Runtime config
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.RuntimeConfigDTO'
          description: OK
          headers:
            Last-Modified:
              description: RFC1123 of updated_at
              schema:
                type: string
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Unauthorized
        "412":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Precondition Failed
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Internal Server Error
      security:
      - CookieAuth: []
      - ApiKeyAuth: []
      summary: Update runtime configuration
      tags:
      - config
  /counters:
    get:
      description: Returns InstanceCountersDTO per configured Sonarr.
      parameters:
      - description: 24h|7d|30d (default 24h)
        in: query
        name: window
        schema:
          enum:
          - 24h
          - 7d
          - 30d
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.CountersAggregateDTO'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Unauthorized
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Internal Server Error
      security:
      - CookieAuth: []
      - ApiKeyAuth: []
      summary: Aggregate counters across every instance
      tags:
      - counters
  /decisions:
    get:
      parameters:
      - description: Page size (default 50, max 200)
        in: query
        name: limit
        schema:
          type: integer
      - description: Opaque next_cursor
        in: query
        name: cursor
        schema:
          type: string
      - description: Filter by instance
        in: query
        name: instance
        schema:
          type: string
      - description: Filter by parent scan_run UUID
        in: query
        name: scan_run_id
        schema:
          type: string
      - description: Filter by series ID
        in: query
        name: series_id
        schema:
          type: integer
      - description: Filter by season
        in: query
        name: season_number
        schema:
          type: integer
      - description: Filter by outcome
        in: query
        name: decision
        schema:
          enum:
          - grab
          - skip
          - blocked_cooldown
          - already_optimal
          - expired
          - error
          type: string
      - description: RFC3339 lower bound
        in: query
        name: from
        schema:
          type: string
      - description: RFC3339 upper bound
        in: query
        name: to
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.DecisionList'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Bad Request
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Internal Server Error
      security:
      - CookieAuth: []
      - ApiKeyAuth: []
      summary: List decisions
      tags:
      - decisions
  /decisions/{id}:
    get:
      parameters:
      - description: Decision UUID
        in: path
        name: id
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.Decision'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Bad Request
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Not Found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Internal Server Error
      security:
      - CookieAuth: []
      - ApiKeyAuth: []
      summary: Get decision by ID
      tags:
      - decisions
  /decisions/{id}/grab:
    post:
      description: |-
        Explicit-confirm path that bypasses global dry_run for
        one decision. Idempotent on (instance, series, season,
        release_guid). Eligible only when decision == "grab",
        selected_guid != "" and dry_run_would_grab == true.
      parameters:
      - description: Decision UUID
        in: path
        name: id
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.Grab'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Bad Request
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Not Found
        "409":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Conflict
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Internal Server Error
        "502":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Bad Gateway
      security:
      - CookieAuth: []
      - ApiKeyAuth: []
      summary: Grab the release the decision selected
      tags:
      - decisions
  /decisions/{id}/rescan:
    post:
      description: |-
        Asynchronously re-evaluates (instance, series, season).
        Bypasses GUID cooldowns. Returns 202 immediately with a
        fresh scan_run_id; the goroutine writes the new decision
        and marks the original superseded. 409 if the original
        already produced a grab_records row or if another scan
        is running on the same instance.
      parameters:
      - description: Decision UUID
        in: path
        name: id
