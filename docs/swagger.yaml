components:
  schemas:
    auth.CheckDiscovery:
      properties:
        discovered_issuer:
          type: string
        error:
          type: string
        ok:
          type: boolean
      type: object
    auth.CheckIssuerMatch:
      properties:
        expected:
          type: string
        got:
          type: string
        ok:
          type: boolean
      type: object
    auth.CheckJWKS:
      properties:
        error:
          type: string
        keys:
          type: integer
        ok:
          type: boolean
      type: object
    auth.CheckTokenEndpoint:
      properties:
        error:
          type: string
        ok:
          type: boolean
        url:
          type: string
      type: object
    auth.OIDCTestResult:
      properties:
        discovery:
          $ref: '#/components/schemas/auth.CheckDiscovery'
        issuer_match:
          $ref: '#/components/schemas/auth.CheckIssuerMatch'
        jwks:
          $ref: '#/components/schemas/auth.CheckJWKS'
        token_endpoint:
          $ref: '#/components/schemas/auth.CheckTokenEndpoint'
      type: object
    dto.AuthConfigDTO:
      properties:
        local_bypass:
          example: false
          type: boolean
        login_url:
          example: /api/v1/auth/oidc/start
          type: string
        mode:
          example: forms
          type: string
        oidc_ready:
          description: |-
            OIDCReady mirrors middleware.OIDCRuntime.IsReady(). When true,
            LoginURL is also populated — SPA renders SSO button regardless of mode.
          example: false
          type: boolean
      type: object
    dto.CounterBucketDTO:
      properties:
        date:
          type: string
        fails:
          type: integer
        grabs:
          type: integer
        imports:
          type: integer
      type: object
    dto.CounterTotals:
      properties:
        fails:
          type: integer
        grabs:
          type: integer
        imports:
          type: integer
      type: object
    dto.CountersAggregateDTO:
      properties:
        items:
          items:
            $ref: '#/components/schemas/dto.InstanceCountersDTO'
          type: array
          uniqueItems: false
      type: object
    dto.Decision:
      properties:
        aired_episodes:
          example: 8
          type: integer
        candidates_count:
          type: integer
        category:
          enum:
          - all_complete
          - sonarr_handles
          - action_taken
          - blocked
          - nothing_found
          - error
          - unknown
          example: action_taken
          type: string
        created_at:
          type: string
        decision:
          enum:
          - grab
          - skip
          - blocked_cooldown
          - already_optimal
          - expired
          - error
          example: grab
          type: string
        dry_run_would_grab:
          type: boolean
        error_detail:
          example: 'sonarr: 503 service unavailable'
          type: string
        existing_count:
          type: integer
        existing_episodes:
          example: 3
          type: integer
        grabbed_episodes:
          example: 5
          type: integer
        id:
          example: dec_001
          type: string
        instance:
          example: alpha
          type: string
        missing_count:
          type: integer
        reason:
          example: upgrade_available
          type: string
        releases_found:
          type: integer
        scan_run_id:
          type: string
        season_number:
          type: integer
        selected_guid:
          type: string
        series_id:
          type: integer
        series_title:
          example: Severance
          type: string
        superseded_by_id:
          example: 7b3d4a92-1234-4abc-9def-000000000005
          type: string
        total_episodes:
          example: 10
          type: integer
      type: object
    dto.DecisionList:
      properties:
        items:
          items:
            $ref: '#/components/schemas/dto.Decision'
          type: array
          uniqueItems: false
        next_cursor:
          type: string
      type: object
    dto.EpisodeFileDetail:
      properties:
        episode_numbers:
          example:
          - 1
          - 2
          items:
            type: integer
          type: array
          uniqueItems: false
        id:
          example: 7001
          type: integer
        quality:
          example: WEBDL-2160p
          type: string
        relative_path:
          example: Season 02/Severance.S02E01.mkv
          type: string
        season_number:
          example: 2
          type: integer
        size_bytes:
          example: 13325829734
          type: integer
      type: object
    dto.EpisodeFileList:
      properties:
        items:
          items:
            $ref: '#/components/schemas/dto.EpisodeFileDetail'
          type: array
          uniqueItems: false
      type: object
    dto.ErrorResponse:
      properties:
        code:
          example: UNAUTHORIZED
          type: string
        error:
          example: unauthorized
          type: string
      type: object
    dto.Grab:
      properties:
        attempts:
          type: integer
        coverage_count:
          type: integer
        created_at:
          type: string
        custom_format_score:
          type: integer
        error_message:
          type: string
        id:
          example: grb_001
          type: string
        indexer_id:
          type: integer
        indexer_name:
          example: tracker.x
          type: string
        instance:
          example: alpha
          type: string
        parsed:
          $ref: '#/components/schemas/dto.GrabParsed'
        parsed_at:
          description: |-
            ParsedAt is the wall-clock at which Sonarr parsed the release
            title. Always emitted alongside a non-null Parsed; omitted when
            Parsed is null.
          type: string
        quality:
          example: WEBDL-1080p
          type: string
        release_guid:
          type: string
        release_title:
          type: string
        replay_of_id:
          description: |-
            ReplayOfID — uuid of the original row this row re-grabs.
            Populated by the Watchdog regrab path (039f-2); nil for scan /
            rescan / manual paths. Omitted when nil.
          example: 7b3d4a92-1234-4abc-9def-000000000003
          type: string
        replayed_by:
          description: |-
            ReplayedBy — uuids of newer grab_records rows that re-grab THIS
            row (reverse of replay_of_id). Derived at read time by the
            audit handler — a single batched SELECT covers the page. Capped
            at ports.MaxReplaysPerParent (50); SPA renders "+N more" past
            that. Empty slice omitted from wire.
          items:
            type: string
          type: array
          uniqueItems: false
        scan_run_id:
          type: string
        season_number:
          type: integer
        series_id:
          type: integer
        series_title:
          example: Severance
          type: string
        size_bytes:
          description: |-
            SizeBytes — release size in bytes (Sonarr OnGrab `release.size`
            or manual-grab `releaseDTO.size`). Omitted when nil; SPA
            renders "—" for missing values.
          example: 13325829734
          type: integer
        status:
          enum:
          - grabbed
          - imported
          - import_failed
          - grab_failed
          - expired
          example: imported
          type: string
        torrent_hash:
          description: |-
            TorrentHash — qBit info-hash (40-char lowercase hex) captured
            by the OnGrab webhook (Phase 10) or stamped at force-grab time.
            Omitted from wire when nil so pre-Phase-10 rows stay clean.
          example: 0123456789abcdef0123456789abcdef01234567
          type: string
        updated_at:
          type: string
      type: object
    dto.GrabList:
      properties:
        items:
          items:
            $ref: '#/components/schemas/dto.Grab'
          type: array
          uniqueItems: false
        next_cursor:
          type: string
      type: object
    dto.GrabParsed:
      description: |-
        Parsed carries the Sonarr /api/v3/parse projection captured by
        the OnGrab webhook in 044b. Nullable — pre-B2 rows and rows whose
        parse call failed both emit `null`. The SPA Grabs page chip set
        degrades to "no parsed" on null.
      properties:
        codec:
          example: HEVC
          type: string
        dub:
          example: Original
          type: string
        hdr_flags:
          example:
          - HDR10+
          - DV
          items:
            type: string
          type: array
          uniqueItems: false
        languages:
          example:
          - Russian
          - English
          items:
            type: string
          type: array
          uniqueItems: false
        quality:
          example: WEBDL-2160p
          type: string
        release_group:
          example: NTb
          type: string
        resolution:
          example: 2160
          type: integer
        source:
          example: WEB-DL
          type: string
        subs:
          example:
          - RUS
          items:
            type: string
          type: array
          uniqueItems: false
      type: object
    dto.HealthStatus:
      properties:
        status:
          example: ok
          type: string
      type: object
    dto.Instance:
      properties:
        health:
          enum:
          - Available
          - UnavailableAuth
          - UnavailableNetwork
          - UnavailableUnknown
          example: Available
          type: string
        last_check_at:
          type: string
        last_error:
          type: string
        mode:
          enum:
          - auto
          - manual
          example: auto
          type: string
        name:
          example: alpha
          type: string
        public_url:
          example: https://sonarr.example.com
          type: string
        transitions_count:
          type: integer
        url:
          example: http://sonarr:8989
          type: string
      type: object
    dto.InstanceCooldown:
      properties:
        guid_after_failed_grab_sec:
          type: integer
        guid_after_failed_import_sec:
          type: integer
        mode:
          enum:
          - smart
          - strict
          type: string
        series_after_grab_sec:
          type: integer
      type: object
    dto.InstanceCountersDTO:
      properties:
        avg_grabs_7d:
          example: 9.5
          type: number
        instance_name:
          example: homelab
          type: string
        sparkline:
          items:
            $ref: '#/components/schemas/dto.CounterBucketDTO'
          type: array
          uniqueItems: false
        totals:
          $ref: '#/components/schemas/dto.CounterTotals'
        window:
          enum:
          - 24h
          - 7d
          - 30d
          example: 24h
          type: string
      type: object
    dto.InstanceCreateRequest:
      properties:
        api_key:
          example: abcd...
          type: string
        cooldown:
          $ref: '#/components/schemas/dto.InstanceCooldown'
        dry_run:
          type: boolean
        health_check:
          $ref: '#/components/schemas/dto.InstanceHealthCheck'
        limits:
          $ref: '#/components/schemas/dto.InstanceLimits'
        mode:
          example: auto
          type: string
        name:
          example: alpha
          type: string
        parse_on_grab_enabled:
          description: |-
            ParseOnGrabEnabled — pointer so omitted is distinguishable from
            explicit false. Omitted/null defaults to true.
          example: true
          type: boolean
        public_url:
          description: |-
            PublicURL — optional browser-facing URL. Omitted/null = no
            override. Empty string is rejected at the application layer with
            INVALID_INSTANCE_PUBLIC_URL so a client cannot accidentally
            downgrade the override into a silent no-op.
          example: https://sonarr.example.com
          type: string
        ranking:
          $ref: '#/components/schemas/dto.InstanceRanking'
        rate_limit_burst:
          type: integer
        rate_limit_rpm:
          type: integer
        retry:
          $ref: '#/components/schemas/dto.InstanceRetry'
        scan_skip_handled_seasons:
          description: |-
            ScanSkipHandledSeasons — pointer so omitted is distinguishable
            from explicit false. Omitted/null defaults to true (matches the
            046b migration default). Concrete false disables the scan
            pre-filter for this instance, forcing every monitored season through
            the full evaluator.
          example: true
          type: boolean
        search:
          $ref: '#/components/schemas/dto.InstanceSearch'
        search_timeout_sec:
          type: integer
        tags:
          $ref: '#/components/schemas/dto.InstanceTags'
        timeout_sec:
          type: integer
        url:
          example: http://sonarr:8989
          type: string
        webhook_install_enabled:
          description: |-
            WebhookInstallEnabled — pointer so omitted is distinguishable
            from explicit `false`. Omitted/null defaults to true (matches the
            migration default). Concrete false explicitly disables the 041c
            reconciler.
          example: true
          type: boolean
        webhook_url_override:
          description: |-
            WebhookURLOverride — optional base URL for the auto-installed
            Sonarr webhook. Omitted/null = use derived public URL from
            runtime config. Empty-string rejected as for PublicURL.
          example: https://seasonfill.example.com
          type: string
      type: object
    dto.InstanceDetail:
      properties:
        api_key:
          example: '***'
          type: string
        cooldown:
          $ref: '#/components/schemas/dto.InstanceCooldown'
        dry_run:
          type: boolean
        health_check:
          $ref: '#/components/schemas/dto.InstanceHealthCheck'
        limits:
          $ref: '#/components/schemas/dto.InstanceLimits'
        mode:
          enum:
          - auto
          - manual
          example: auto
          type: string
        name:
          example: alpha
          type: string
        parse_on_grab_enabled:
          description: |-
            ParseOnGrabEnabled toggles the 044b parse-on-OnGrab hook. Always
            emitted as a concrete bool; defaults to true on fresh rows.
          example: true
          type: boolean
        public_url:
          description: |-
            PublicURL is the optional browser-facing URL (D64). Always
            emitted; the JSON value is `null` when no override is stored.
          example: https://sonarr.example.com
          type: string
        ranking:
          $ref: '#/components/schemas/dto.InstanceRanking'
        rate_limit_burst:
          type: integer
        rate_limit_rpm:
          type: integer
        retry:
          $ref: '#/components/schemas/dto.InstanceRetry'
        scan_skip_handled_seasons:
          description: |-
            ScanSkipHandledSeasons toggles the 046b scan pre-filter. Always
            emitted as a concrete bool; defaults to true on fresh rows. When
            true, scans skip seasons that Sonarr already handles (complete OR
            nothing-on-disk-and-aired). When false, every monitored season
            goes through the full evaluator (regression guard).
          example: true
          type: boolean
        search:
          $ref: '#/components/schemas/dto.InstanceSearch'
        search_timeout_sec:
          type: integer
        tags:
          $ref: '#/components/schemas/dto.InstanceTags'
        timeout_sec:
          type: integer
        ui_url:
          description: |-
            UIURL is the derived browser-facing URL the SPA links to. Equals
            PublicURL when set, otherwise URL. Always emitted as a non-empty
            string so the SPA never has to compute the fallback itself.
          example: https://sonarr.example.com
          type: string
        updated_at:
          type: string
        url:
          example: http://sonarr:8989
          type: string
        webhook_install_enabled:
          description: |-
            WebhookInstallEnabled toggles the 041c reconciler (D65). Always
            emitted as a concrete bool; defaults to true on fresh rows.
          example: true
          type: boolean
        webhook_url_override:
          description: |-
            WebhookURLOverride is the optional base URL for the auto-installed
            Sonarr webhook (D65). Always emitted; `null` when unset.
          example: https://seasonfill.example.com
          type: string
      type: object
    dto.InstanceHealthCheck:
      properties:
        recheck_auth_sec:
          type: integer
        recheck_network_sec:
          type: integer
      type: object
    dto.InstanceLimits:
      properties:
        max_grabs_per_scan:
          type: integer
        scan_max_series:
          type: integer
      type: object
    dto.InstanceList:
      properties:
        instances:
          items:
            $ref: '#/components/schemas/dto.Instance'
          type: array
          uniqueItems: false
      type: object
    dto.InstanceRanking:
      properties:
        indexer_priority_enabled:
          type: boolean
        origin_bonus:
          type: number
      type: object
    dto.InstanceRetry:
      properties:
        initial_backoff_sec:
          type: integer
        max_attempts:
          type: integer
        max_backoff_sec:
          type: integer
      type: object
    dto.InstanceSearch:
      properties:
        min_custom_format_score:
          type: integer
        require_all_aired:
          type: boolean
        skip_anime:
          type: boolean
        skip_specials:
          type: boolean
      type: object
    dto.InstanceTags:
      properties:
        exclude:
          items:
            type: string
          type: array
          uniqueItems: false
        include:
          items:
            type: string
          type: array
          uniqueItems: false
        mode:
          enum:
          - include
          - exclude
          - "off"
          example: include
          type: string
      type: object
    dto.InstanceTestRequest:
      properties:
        api_key:
          example: abcd...
          type: string
        url:
          example: http://sonarr:8989
          type: string
      type: object
    dto.InstanceTestResponse:
      properties:
        ok:
          type: boolean
        reason:
          type: string
        version:
          type: string
      type: object
    dto.InstanceUpdateRequest:
      properties:
        api_key:
          example: abcd...
          type: string
        cooldown:
          $ref: '#/components/schemas/dto.InstanceCooldown'
        dry_run:
          type: boolean
        health_check:
          $ref: '#/components/schemas/dto.InstanceHealthCheck'
        limits:
          $ref: '#/components/schemas/dto.InstanceLimits'
        mode:
          example: auto
          type: string
        name:
          example: alpha
          type: string
        parse_on_grab_enabled:
          description: |-
            ParseOnGrabEnabled — pointer so omitted is distinguishable from
            explicit false. Omitted/null defaults to true.
          example: true
          type: boolean
        public_url:
          description: |-
            PublicURL — optional browser-facing URL. Omitted/null = no
            override. Empty string is rejected at the application layer with
            INVALID_INSTANCE_PUBLIC_URL so a client cannot accidentally
            downgrade the override into a silent no-op.
          example: https://sonarr.example.com
          type: string
        ranking:
          $ref: '#/components/schemas/dto.InstanceRanking'
        rate_limit_burst:
          type: integer
        rate_limit_rpm:
          type: integer
        retry:
          $ref: '#/components/schemas/dto.InstanceRetry'
        scan_skip_handled_seasons:
          description: |-
            ScanSkipHandledSeasons — pointer so omitted is distinguishable
            from explicit false. Omitted/null defaults to true (matches the
            046b migration default). Concrete false disables the scan
            pre-filter for this instance, forcing every monitored season through
            the full evaluator.
          example: true
          type: boolean
        search:
          $ref: '#/components/schemas/dto.InstanceSearch'
        search_timeout_sec:
          type: integer
        tags:
          $ref: '#/components/schemas/dto.InstanceTags'
        timeout_sec:
          type: integer
        url:
          example: http://sonarr:8989
          type: string
        webhook_install_enabled:
          description: |-
            WebhookInstallEnabled — pointer so omitted is distinguishable
            from explicit `false`. Omitted/null defaults to true (matches the
            migration default). Concrete false explicitly disables the 041c
            reconciler.
          example: true
          type: boolean
        webhook_url_override:
          description: |-
            WebhookURLOverride — optional base URL for the auto-installed
            Sonarr webhook. Omitted/null = use derived public URL from
            runtime config. Empty-string rejected as for PublicURL.
          example: https://seasonfill.example.com
          type: string
      type: object
    dto.LoginRequest:
      properties:
        password:
          example: hunter2
          type: string
        username:
          example: admin
          type: string
      type: object
    dto.MissingSeasonStat:
      properties:
        missing_aired_count:
          type: integer
        season_number:
          type: integer
      type: object
    dto.MissingSeries:
      properties:
        monitored:
          example: true
          type: boolean
        poster_path:
          example: /MediaCover/122/poster.jpg
          type: string
        seasons:
          items:
            $ref: '#/components/schemas/dto.MissingSeasonStat'
          type: array
          uniqueItems: false
        series_id:
          example: 122
          type: integer
        title:
          example: Severance
          type: string
        title_slug:
          example: severance
          type: string
        total_missing_aired:
          type: integer
        year:
          example: 2022
          type: integer
      type: object
    dto.MissingSeriesList:
      properties:
        items:
          items:
            $ref: '#/components/schemas/dto.MissingSeries'
          type: array
          uniqueItems: false
        total:
          type: integer
      type: object
    dto.OKResponse:
      properties:
        ok:
          example: true
          type: boolean
      type: object
    dto.PasswordChangeRequest:
      properties:
        current:
          example: hunter22
          type: string
        new:
          example: NewSecretLongEnough
          type: string
      type: object
    dto.QbitDiscoverDTO:
      properties:
        category:
          type: string
        name:
          type: string
        url:
          type: string
        username:
          type: string
      type: object
    dto.QbitSettingsDTO:
      properties:
        category:
          example: sonarr
          type: string
        created_at:
          type: string
        custom_unregistered_msgs:
          items:
            type: string
          type: array
          uniqueItems: false
        enabled:
          example: true
          type: boolean
        id:
          example: 1
          type: integer
        instance_id:
          example: 7
          type: integer
        instance_name:
          example: alpha
          type: string
        max_consecutive_no_better:
          example: 3
          type: integer
        password_set:
          example: true
          type: boolean
        poll_interval_minutes:
          example: 30
          type: integer
        regrab_cooldown_hours:
          example: 120
          type: integer
        updated_at:
          type: string
        url:
          example: http://qbit.local:8080
          type: string
        username:
          example: admin
          type: string
      type: object
    dto.QbitSettingsUpsertRequest:
      properties:
        category:
          example: sonarr
          type: string
        custom_unregistered_msgs:
          items:
            type: string
          type: array
          uniqueItems: false
        enabled:
          example: true
          type: boolean
        max_consecutive_no_better:
          example: 3
          type: integer
        password:
          example: hunter2
          type: string
        poll_interval_minutes:
          example: 30
          type: integer
        regrab_cooldown_hours:
          example: 120
          type: integer
        url:
          example: http://qbit.local:8080
          type: string
        username:
          example: admin
          type: string
      type: object
    dto.ReadyStatus:
      properties:
        database:
          example: true
          type: boolean
        status:
          enum:
          - ok
          - unavailable
          example: ok
          type: string
      type: object
    dto.RuntimeAuthDTO:
      properties:
        local_bypass:
          description: LocalBypass enables the local-address bypass middleware (036c).
          type: boolean
        local_networks:
          description: LocalNetworks is the CIDR allow-list driving local-bypass.
          example:
          - 127.0.0.0/8
          - 10.0.0.0/8
          items:
            type: string
          type: array
          uniqueItems: false
        mode:
          description: Mode is one of "forms" | "basic" | "none" | "oidc". Default
            "forms".
          example: forms
          type: string
        oidc:
          $ref: '#/components/schemas/dto.RuntimeOIDCDTO'
        secure_cookie:
          type: boolean
        session_epoch:
          description: |-
            SessionEpoch is read-only — the server bumps it whenever any
            auth-invalidating field changes. PUT bodies that include it are
            silently ignored (the usecase manages the value).
          example: 0
          type: integer
        session_ttl:
          example: 12h
          type: string
        trusted_proxies:
          example:
          - 127.0.0.1
          - ::1
          items:
            type: string
          type: array
          uniqueItems: false
      type: object
    dto.RuntimeConfigDTO:
      properties:
        auth:
          $ref: '#/components/schemas/dto.RuntimeAuthDTO'
        auto_generated_api_key:
          example: false
          type: boolean
        cron:
          $ref: '#/components/schemas/dto.RuntimeCronDTO'
        dry_run:
          type: boolean
        global_rate_limit:
          $ref: '#/components/schemas/dto.RuntimeRateLimitDTO'
        scan:
          $ref: '#/components/schemas/dto.RuntimeScanDTO'
        updated_at:
          type: string
      type: object
    dto.RuntimeCronDTO:
      properties:
        enabled:
          type: boolean
        jitter:
          example: 1m
          type: string
        on_start:
          type: boolean
        schedule:
          example: 0 */6 * * *
