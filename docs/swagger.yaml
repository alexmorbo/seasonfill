  /instances/{name}/series/{id}:
    get:
      description: |-
        Returns the full Series Detail Page payload — series
        hero, library tile, seasons accordion, cast, recommendations,
        taxonomy, external links — composed from the local entity
        tables in one call. Each section is independently degradable:
        a failed enrichment source surfaces as a `degraded[]` entry
        with the affected section's data falling back to nil/empty
        (NEVER 5xx). The single live call is the local Sonarr /queue
        for the in-flight download chip — unreachable Sonarr also
        surfaces via `degraded[]`.
      parameters:
      - description: Instance name
        in: path
        name: name
        required: true
        schema:
          type: string
      - description: Sonarr series id (per-instance)
        in: path
        name: id
        required: true
        schema:
          type: integer
      - description: BCP-47 language tag (default en-US)
        in: query
        name: lang
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.SeriesDetailResponse'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Unauthorized
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Not Found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Internal Server Error
      security:
      - CookieAuth: []
      - ApiKeyAuth: []
      summary: Composite series detail document
      tags:
      - instances
  /instances/{name}/series/{id}/cast:
    get:
      description: |-
        Returns the complete cast and crew for one series —
        cast sorted by TMDB billing order, crew grouped by
        department then person name. Each row carries the
        per-person `episode_count` (from TMDB
        aggregate_credits[*].total_episode_count) and an
        `in_library` flag derived from local
        `person_credits` intersected with active
        `series_cache` rows (excluding the current series so
        the "what else are they in?" affordance never
        renders a self-link).

        `total_episode_count` is the series-level divisor
        the frontend uses to derive Main / Recurring /
        Guest badges from `episode_count /
        total_episode_count` (design-handoff Q3).
      parameters:
      - description: Instance name
        in: path
        name: name
        required: true
        schema:
          type: string
      - description: Sonarr series id (per-instance)
        in: path
        name: id
        required: true
        schema:
          type: integer
      - description: BCP-47 language tag (default en-US, reserved for H-2 parity —
          cast list has no per-language fields in v1)
        in: query
        name: lang
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.SeriesCastResponse'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Unauthorized
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Not Found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Internal Server Error
      security:
      - CookieAuth: []
      - ApiKeyAuth: []
      summary: Full series cast & crew
      tags:
      - instances
  /instances/{name}/series/{id}/poster:
    get:
      description: |-
        Streams the poster image from the upstream Sonarr at
        /api/v3/MediaCover/{seriesId}/poster[-500].jpg with
        authentication injected server-side. size=small returns
        the 500px variant; default is the full-size poster.
        Responses are served from an in-process LRU cache after
        the first fetch; ETag is synthesized server-side so
        If-None-Match cheaply produces a 304 without touching
        Sonarr.
      parameters:
      - description: Instance name
        in: path
        name: name
        required: true
        schema:
          type: string
      - description: Sonarr series id
        in: path
        name: id
        required: true
        schema:
          type: integer
      - description: full (default) or small
        in: query
        name: size
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                type: string
            image/jpeg:
              schema:
                format: binary
                type: string
          description: poster image bytes
        "304":
          description: not modified (when If-None-Match matched cache or upstream)
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Unauthorized
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: unknown instance or poster missing
        "502":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Bad Gateway
      security:
      - CookieAuth: []
      - ApiKeyAuth: []
      summary: Stream a Sonarr series poster
      tags:
      - instances
  /instances/{name}/series/{id}/season/{n}:
    get:
      description: |-
        Returns the seasons-accordion subset of the composite
        read for one season. Cheaper than the full series detail
        endpoint — exists for the SPA's polling path when a
        specific season is expanded and needs fresher per-instance
        state without re-fetching the whole series document.
      parameters:
      - description: Instance name
        in: path
        name: name
        required: true
        schema:
          type: string
      - description: Sonarr series id
        in: path
        name: id
        required: true
        schema:
          type: integer
      - description: Season number (0 = Specials)
        in: path
        name: "n"
        required: true
        schema:
          type: integer
      - description: BCP-47 language tag (default en-US)
        in: query
        name: lang
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.SeasonDetailResponse'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Unauthorized
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Not Found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Internal Server Error
      security:
      - CookieAuth: []
      - ApiKeyAuth: []
      summary: Series season detail (single-season subset)
      tags:
      - instances
  /instances/{name}/series/{id}/seasons/{season}/episodes:
    get:
      description: |-
        Per-episode `have`/`miss` state for the queue drill.
        `have` = files on disk; `miss` = monitored + aired
        + no file (matches the season-chip count from
        /instances/:name/missing).
      parameters:
      - description: Instance name
        in: path
        name: name
        required: true
        schema:
          type: string
      - description: Sonarr series ID
        in: path
        name: id
        required: true
        schema:
          type: integer
      - description: Season number (0 = specials)
        in: path
        name: season
        required: true
        schema:
          type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.SeasonEpisodeList'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Unauthorized
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Not Found
        "502":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Bad Gateway
      security:
      - CookieAuth: []
      - ApiKeyAuth: []
      summary: List episodes of one season with on-disk state
      tags:
      - instances
  /instances/{name}/watchdog/blacklist:
    get:
      description: Keyset-paginated by (created_at DESC, id DESC).
      parameters:
      - description: Instance name
        in: path
        name: name
        required: true
        schema:
          type: string
      - description: Page size (default 50, max 200)
        in: query
        name: limit
        schema:
          type: integer
      - description: Opaque next_cursor
        in: query
        name: cursor
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.WatchdogBlacklistList'
          description: OK
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Not Found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Internal Server Error
      security:
      - CookieAuth: []
      - ApiKeyAuth: []
      summary: List Watchdog blacklist entries for an instance
      tags:
      - watchdog
  /instances/{name}/watchdog/blacklist/{id}:
    delete:
      parameters:
      - description: Instance name
        in: path
        name: name
        required: true
        schema:
          type: string
      - description: Blacklist row id
        in: path
        name: id
        required: true
        schema:
          type: integer
      responses:
        "204":
          description: No Content
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Not Found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Internal Server Error
      security:
      - CookieAuth: []
      - ApiKeyAuth: []
      summary: Un-blacklist a Watchdog row
      tags:
      - watchdog
  /instances/{name}/watchdog/rollups:
    get:
      parameters:
      - description: Instance name
        in: path
        name: name
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.WatchdogRollup'
          description: OK
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Not Found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Internal Server Error
      security:
      - CookieAuth: []
      - ApiKeyAuth: []
      summary: Watchdog rollups for one instance
      tags:
      - watchdog
  /instances/{name}/webhook/install:
    post:
      description: |-
        Forces a synchronous Reconcile pass. Returns 200 +
        {created:false} when the webhook was already present
        OR an existing entry's URL was updated in place. Returns
        201 + {created:true} when a new entry was POSTed.
      parameters:
      - description: Instance name
        in: path
        name: name
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.WebhookInstallDTO'
          description: OK
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.WebhookInstallDTO'
          description: Created
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Unauthorized
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Not Found
        "412":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: public_url undetermined
        "502":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Bad Gateway
      security:
      - CookieAuth: []
      - ApiKeyAuth: []
      summary: Auto-install the seasonfill webhook into Sonarr
      tags:
      - instances
  /instances/{name}/webhook/status:
    get:
      description: |-
        Reads the in-memory StatusCache populated by the
        reconciler. Stale entries trigger a lazy refresh
        (one Sonarr round-trip) before serving. Optional
        `error` field carries the last reconcile failure.
      parameters:
      - description: Instance name
        in: path
        name: name
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.WebhookStatusDTO'
          description: OK
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Not Found
      security:
      - CookieAuth: []
      - ApiKeyAuth: []
      summary: Check whether the seasonfill webhook is installed in Sonarr
      tags:
      - instances
  /instances/test:
    post:
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/dto.InstanceTestRequest'
        description: URL and api_key to probe
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.InstanceTestResponse'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Bad Request
        "429":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Too Many Requests
        "504":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Gateway Timeout
      security:
      - CookieAuth: []
      - ApiKeyAuth: []
      summary: Probe a Sonarr instance for reachability/auth
      tags:
      - instances
  /media/{hash}:
    get:
      description: |-
        Streams the content-addressed asset bytes. Cache-Control
        is one year immutable (hash-based URLs are stable);
        ETag is the hash itself so If-None-Match always 304s.
      parameters:
      - description: sha256 hex of the upstream URL
        in: path
        name: hash
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                type: string
            image/jpeg:
              schema:
                format: binary
                type: string
          description: asset bytes
        "304":
          description: not modified
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Bad Request
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: pending / failed / unknown hash
      security:
      - CookieAuth: []
      - ApiKeyAuth: []
      summary: Stream a stored media asset
      tags:
      - media
  /readyz:
    get:
      description: |-
        200 when pod-local dependencies (DB) are healthy.
        External Sonarr health is reported via /api/v1/instances.
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ReadyStatus'
          description: OK
        "503":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ReadyStatus'
          description: Service Unavailable
      summary: Readiness probe
      tags:
      - health
  /scan:
    post:
      description: |-
        Asynchronously schedules a scan across all configured
        instances or the named one. Returns 202 immediately
        with status="running"; clients poll /scans/{id} for
        live progress (series_scanned increments mid-scan).
        Optional `series_ids` narrows a per-instance scan;
        unknown IDs are silently dropped with a WARN.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/dto.ScanTriggerRequest'
        description: Optional instance + series filter
      responses:
        "202":
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/dto.ScanTriggerItem'
                type: array
          description: Accepted
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ScanNotFoundResponse'
          description: Not Found
        "409":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ScanConflictResponse'
          description: SCAN_IN_PROGRESS
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Internal Server Error
      security:
      - CookieAuth: []
      - ApiKeyAuth: []
      summary: Trigger a manual scan
      tags:
      - scans
  /scans:
    get:
      description: Keyset-paginated, newest first.
      parameters:
      - description: Page size (default 50, max 200)
        in: query
        name: limit
        schema:
          type: integer
      - description: Opaque next_cursor
        in: query
        name: cursor
        schema:
          type: string
      - description: Filter by instance
        in: query
        name: instance
        schema:
          type: string
      - description: Filter by status
        in: query
        name: status
        schema:
          enum:
          - running
          - completed
          - failed
          - aborted
          type: string
      - description: RFC3339 lower bound
        in: query
        name: from
        schema:
          type: string
      - description: RFC3339 upper bound (exclusive)
        in: query
        name: to
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ScanList'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Bad Request
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Internal Server Error
      security:
      - CookieAuth: []
      - ApiKeyAuth: []
      summary: List scans
      tags:
      - scans
  /scans/{id}:
    get:
      parameters:
      - description: Scan run UUID
        in: path
        name: id
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.Scan'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Bad Request
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Not Found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Internal Server Error
      security:
      - CookieAuth: []
      - ApiKeyAuth: []
      summary: Get scan by ID
      tags:
      - scans
  /scans/{id}/cancel:
    post:
      description: |-
        Signals cancellation of the named scan run. The goroutine
        observes the signal at the next ctx.Err() checkpoint and
        finalises with status="cancelled". Already-collected
        decisions are kept; already-issued grabs are NOT undone.
      parameters:
      - description: Scan run UUID
        in: path
        name: id
        required: true
        schema:
          type: string
      responses:
        "202":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.OKResponse'
          description: Accepted
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: invalid id
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: scan not running
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Internal Server Error
      security:
      - CookieAuth: []
      - ApiKeyAuth: []
      summary: Cancel a running scan
      tags:
      - scans
  /watchdog/rollups:
    get:
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.WatchdogRollupList'
          description: OK
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Internal Server Error
      security:
      - CookieAuth: []
      - ApiKeyAuth: []
      summary: Watchdog rollups for every configured instance
      tags:
      - watchdog
  /watchdog/seasons:
    get:
      description: Aggregate read view driven by origin_releases.
      parameters:
      - description: Filter by instance name
        in: query
        name: instance
        schema:
          type: string
      - description: Search series title (LIKE %q%)
        in: query
        name: q
        schema:
          type: string
      - description: Only seasons with an active cooldown
        in: query
        name: cooldown_only
        schema:
          type: boolean
      - description: Only seasons with an active blacklist row
        in: query
        name: blacklisted_only
        schema:
          type: boolean
      - description: Page size (default 100, max 500)
        in: query
        name: limit
        schema:
          type: integer
      - description: Opaque next_cursor
        in: query
        name: cursor
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.WatchdogSeasonsList'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Bad Request
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Internal Server Error
      security:
      - CookieAuth: []
      - ApiKeyAuth: []
      summary: List watchdog-tracked seasons
      tags:
      - watchdog
  /watchdog/series/{instance}/{id}:
    get:
      description: Per-season aggregate plus recent decisions + grabs.
      parameters:
      - description: Instance name
        in: path
        name: instance
        required: true
        schema:
          type: string
      - description: Sonarr series id
        in: path
        name: id
        required: true
        schema:
          type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.WatchdogSeriesDetail'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Bad Request
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Internal Server Error
      security:
      - CookieAuth: []
      - ApiKeyAuth: []
      summary: Watchdog detail for one series
      tags:
      - watchdog
  /webhooks/status:
    get:
      description: |-
        Fan-out over every configured instance using the
        in-process StatusCache (lazy refresh via Reconciler).
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.WebhookStatusAggregate'
          description: OK
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Internal Server Error
      security:
      - CookieAuth: []
      - ApiKeyAuth: []
      summary: Aggregate webhook status per instance
      tags:
      - webhooks
servers:
- description: Primary API base path
  url: /api/v1
