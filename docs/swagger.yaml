      parameters:
      - description: Page size (default 50, max 200)
        in: query
        name: limit
        schema:
          type: integer
      - description: Opaque next_cursor
        in: query
        name: cursor
        schema:
          type: string
      - description: Filter by instance
        in: query
        name: instance
        schema:
          type: string
      - description: Filter by status
        in: query
        name: status
        schema:
          enum:
          - running
          - completed
          - failed
          - aborted
          type: string
      - description: RFC3339 lower bound
        in: query
        name: from
        schema:
          type: string
      - description: RFC3339 upper bound (exclusive)
        in: query
        name: to
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ScanList'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Bad Request
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Internal Server Error
      security:
      - CookieAuth: []
      - ApiKeyAuth: []
