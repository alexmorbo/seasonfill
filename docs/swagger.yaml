        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ScanNotFoundResponse'
          description: Not Found
        "409":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ScanConflictResponse'
          description: SCAN_IN_PROGRESS
        "500":
          content:
            application/json:
