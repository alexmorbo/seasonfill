        Returns the persisted series_cache rows for an instance,
        filtered by state (all | imported | missing) and an
        optional case-insensitive substring `q` over title /
        title_slug, sorted (updated_desc | title_asc |
        air_date_desc), keyset-paginated. Enriched with
        last_grab_at + last_imported_episode aggregated from
        grab_records.
      parameters:
      - description: Instance name
        in: path
        name: name
        required: true
        schema:
          type: string
      - description: all | imported | missing (default all)
        in: query
        name: state
        schema:
          enum:
          - all
          - imported
          - missing
          type: string
      - description: deprecated alias for state
        in: query
        name: status
        schema:
          type: string
      - description: Case-insensitive substring over title / title_slug
        in: query
        name: q
        schema:
          type: string
      - description: updated_desc | title_asc | air_date_desc (default updated_desc)
        in: query
        name: sort
        schema:
          enum:
          - updated_desc
          - title_asc
          - air_date_desc
          type: string
      - description: 1..100 (default 24)
        in: query
        name: limit
        schema:
          type: integer
      - description: Opaque next_cursor from prior page
        in: query
        name: cursor
        schema:
          type: string
      - description: 1 = monitored only, 0 = unmonitored only
        in: query
        name: monitored
        schema:
          enum:
          - "1"
          - "0"
          - "true"
          - "false"
          type: string
      - description: Pipe-separated broadcast network names (e.g. HBO|Netflix). Max
          32.
        in: query
        name: networks
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.SeriesCacheList'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/dto.ErrorResponse'
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
