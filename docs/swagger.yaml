          description: |-
            Seasons is the seasons-accordion data — one entry per season,
            episodes included (lazy-load avoided per PRD §5.5: TMDB sync
            pulls all seasons eagerly on first pass, so reading them all
            here is cheap).
          items:
            $ref: '#/components/schemas/dto.Season'
          type: array
          uniqueItems: false
        series_id:
          description: |-
            SeriesID is the resolved canonical series.id. Useful to
            frontend for sibling endpoints (cast, person) that key on
            canonical id rather than Sonarr id.
          example: 42
          type: integer
        sonarr_series_id:
          description: SonarrSeriesID is the Sonarr-side id from the URL.
          example: 123
          type: integer
        synced_at:
          description: |-
            SyncedAt is the request timestamp (server-side now()); the
            frontend uses it for the "synced Xs ago" microcopy.
          type: string
        torrents:
          $ref: '#/components/schemas/dto.TorrentsHint'
      type: object
    dto.SeriesHero:
      description: |-
        Hero is the page header (backdrop + poster + title + meta).
        Always present (the canon row always exists post-208 cutover).
      properties:
        backdrop_asset:
          type: string
        content_rating:
          $ref: '#/components/schemas/dto.ContentRatingBadge'
        genres:
          description: |-
            Genres are localised chips (max 5 rendered, the composer
            returns all available — frontend caps display).
          items:
            $ref: '#/components/schemas/dto.TaxonomyChip'
          type: array
          uniqueItems: false
        imdb_rating:
          $ref: '#/components/schemas/dto.RatingScore'
        networks:
          description: Networks are the network-logo strip (max 3 displayed).
          items:
            $ref: '#/components/schemas/dto.NetworkChip'
          type: array
          uniqueItems: false
        next_episode:
          $ref: '#/components/schemas/dto.NextEpisode'
        original_title:
          type: string
        poster_asset:
          type: string
        runtime_minutes:
          example: 45
          type: integer
        status:
          description: |-
            Status is one of "continuing", "ended", "canceled",
            "in_production", "upcoming", or "unknown". Mapping from
            TMDB / Sonarr → these tokens lives in the composer; frontend
            renders the pill colour from this enum, NOT from the raw
            upstream string.
          example: ended
          type: string
        tagline:
          type: string
        title:
          example: Breaking Bad
          type: string
        title_language:
          description: |-
            TitleLanguage is the BCP-47 language the Title was served in.
            Empty when no series_texts row was found and the canon row's
            own title was used.
          example: ru-RU
          type: string
        tmdb_rating:
          $ref: '#/components/schemas/dto.RatingScore'
        trailer:
          $ref: '#/components/schemas/dto.Trailer'
        year_end:
          example: 2013
          type: integer
        year_start:
          example: 2008
          type: integer
      type: object
    dto.SeriesSearchItem:
      properties:
        missing_aired_count:
          example: 8
          type: integer
        monitored:
          example: true
          type: boolean
        season_count:
          example: 2
          type: integer
        series_id:
          example: 122
          type: integer
        title:
          example: Severance
          type: string
      type: object
    dto.SeriesSearchList:
      properties:
        items:
          items:
            $ref: '#/components/schemas/dto.SeriesSearchItem'
          type: array
          uniqueItems: false
        total:
          example: 142
          type: integer
      type: object
    dto.SessionResponse:
      properties:
        auto_generated:
          example: false
          type: boolean
        ok:
          example: true
          type: boolean
        username:
          example: admin
          type: string
      type: object
    dto.TaxonomyChip:
      properties:
        id:
          type: integer
        language:
          example: en-US
          type: string
        name:
          example: Drama
          type: string
      type: object
    dto.TorrentsHint:
      description: |-
        Torrents is the torrent inventory section (design brief §4).
        In this story it is always SyncPending=true + Items=[] — full
        implementation comes from stories A-1..A-4 (219..222).
      properties:
        count:
          description: Count is the number of known torrents; 0 in this story.
          type: integer
        sync_pending:
          description: |-
            SyncPending=true means "torrent inventory not yet available
            for this series". UI hides the section or shows a quiet
            skeleton — design brief §4.5 covers the empty-state shapes.
          type: boolean
        total_size_bytes:
          description: TotalSizeBytes — aggregate size; 0 in this story.
          type: integer
      type: object
    dto.Trailer:
      description: |-
        Trailer is the single best official YouTube trailer. nil when
        no videos row matches (no trailer hidden by design brief §2.1).
      properties:
        key:
          example: X9F1jh5jc-Y
          type: string
        name:
          type: string
        published_at:
          type: string
        site:
          example: YouTube
          type: string
      type: object
    dto.WatchdogBlacklistItem:
