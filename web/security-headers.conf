# Shared security headers. nginx `add_header` does NOT merge across
# config levels — a `location` that declares its own add_header drops
# all inherited ones. So this set is `include`d into the server block
# AND into every location that sets its own add_header (e.g. caching),
# guaranteeing the CSP is never silently dropped on a path.
add_header X-Frame-Options "DENY" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;
