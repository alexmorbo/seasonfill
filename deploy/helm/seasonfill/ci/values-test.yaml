# Values used by CI to render a representative production manifest.
# Exercises the existingSecret path. Used by helm-lint workflow as
# `helm template -f ci/values-test.yaml`.

secrets:
  existingSecret: seasonfill-ci-test

database:
  driver: postgres

ingress:
  enabled: true
  className: nginx
  host: seasonfill.example.com
  tls:
    enabled: true
    secretName: seasonfill-tls

networkPolicy:
  enabled: true
  ingress:
    from:
      - namespaceSelector:
          matchLabels:
            kubernetes.io/metadata.name: ingress-nginx
  egress:
    allowAll: false
    to:
      - to:
          - namespaceSelector:
              matchLabels:
                kubernetes.io/metadata.name: media
            podSelector:
              matchLabels:
                app.kubernetes.io/name: sonarr
        ports:
          - {protocol: TCP, port: 8989}
      - to:
          - namespaceSelector:
              matchLabels:
                kubernetes.io/metadata.name: data
            podSelector:
              matchLabels:
                app.kubernetes.io/name: postgres
        ports:
          - {protocol: TCP, port: 5432}

serviceMonitor:
  enabled: true
  labels:
    release: prometheus
