# Dev/CI values exercising inline-secret mode + sqlite (no Postgres DSN).
# NEVER use in production.

secrets:
  existingSecret: ""
  apiKey: "dev-only-test-key-NEVER-USE-IN-PROD"
  webUser: "admin"
  webPassword: "dev-only-password-NEVER-USE-IN-PROD"
  webPasswordHash: ""
  postgresDSN: ""

database:
  driver: sqlite
  sqlite:
    path: /data/seasonfill.db

persistence:
  enabled: true

ingress:
  enabled: false

networkPolicy:
  enabled: false

serviceMonitor:
  enabled: false
