apiVersion: v2
name: seasonfill-helm
description: |
  Seasonfill — a multi-instance Sonarr backfill controller that scans
  managed series for incomplete seasons and triggers indexer searches
  on a schedule. Singleton service; database stores state. Frontend
  (React SPA served by nginx) ships as a second Deployment.
type: application
version: 0.6.2
appVersion: "0.6.2"
kubeVersion: ">=1.25.0-0"
maintainers:
  - name: AlexMorbo
    email: alex@morbo.ru
sources:
  - https://github.com/alexmorbo/seasonfill
home: https://github.com/alexmorbo/seasonfill
icon: https://raw.githubusercontent.com/alexmorbo/seasonfill/main/web/src/assets/logo.svg
keywords:
  - sonarr
  - media
  - automation
  - backfill
annotations:
  artifacthub.io/license: GPL-3.0-or-later
  artifacthub.io/category: networking
  artifacthub.io/images: |
    - name: seasonfill
      image: ghcr.io/alexmorbo/seasonfill:0.6.2
    - name: seasonfill-web
      image: ghcr.io/alexmorbo/seasonfill-web:0.6.2
  artifacthub.io/changes: |
    - {kind: security, description: "bump jackc/pgx/v5 5.6.0 -> 5.9.2 (CVE-2026-33816 CRITICAL, CVE-2026-41889)"}
    - {kind: security, description: "bump quic-go 0.59.0 -> 0.59.1 (CVE-2026-40898)"}
    - {kind: security, description: "bump filippo.io/edwards25519 1.1.0 -> 1.1.1 (CVE-2026-26958)"}
    - {kind: security, description: "web image base nginx-unprivileged 1.27-alpine (alpine 3.21) -> 1.29-alpine3.23 — closes ~89 alpine CVEs incl. libcrypto3/libssl3 CVE-2026-31789 CRITICAL"}
