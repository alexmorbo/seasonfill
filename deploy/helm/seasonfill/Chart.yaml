apiVersion: v2
name: seasonfill-helm
description: |
  Seasonfill — a multi-instance Sonarr backfill controller that scans
  managed series for incomplete seasons and triggers indexer searches
  on a schedule. Singleton service; database stores state. Frontend
  (React SPA served by nginx) ships as a second Deployment.
type: application
version: 0.4.3
appVersion: "0.4.3"
kubeVersion: ">=1.25.0-0"
maintainers:
  - name: AlexMorbo
    email: alex@morbo.ru
sources:
  - https://github.com/alexmorbo/seasonfill
home: https://github.com/alexmorbo/seasonfill
keywords:
  - sonarr
  - media
  - automation
  - backfill
annotations:
  artifacthub.io/license: GPL-3.0-or-later
  artifacthub.io/category: networking
  artifacthub.io/images: |
    - name: seasonfill
      image: ghcr.io/alexmorbo/seasonfill:0.4.3
    - name: seasonfill-web
      image: ghcr.io/alexmorbo/seasonfill-web:0.4.3
  artifacthub.io/changes: |
    - {kind: removed, description: "BREAKING — drop ConfigMap template; chart no longer renders a config.yaml"}
    - {kind: removed, description: "BREAKING — drop `config.*` values tree (cron, scan, dryRun, http.auth runtime fields)"}
    - {kind: removed, description: "BREAKING — drop `instances[]` and `sonarr-<name>-api-key` Secret keys; instances live in the DB now, edited via Settings UI"}
    - {kind: added, description: "all runtime config moves to the DB and is edited via the Settings UI at /settings"}
    - {kind: added, description: "encrypted at-rest Sonarr instance secrets (AES-GCM, key derived from SEASONFILL_API_KEY via HKDF)"}
    - {kind: changed, description: "SEASONFILL_API_KEY now optional — empty → backend auto-generates on first start and prints once in FIRST-RUN log banner"}
