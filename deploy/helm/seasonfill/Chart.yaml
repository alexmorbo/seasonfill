apiVersion: v2
name: seasonfill-helm
description: |
  Seasonfill — a multi-instance Sonarr backfill controller that scans
  managed series for incomplete seasons and triggers indexer searches
  on a schedule. Singleton service; database stores state. Frontend
  (React SPA served by nginx) ships as a second Deployment.
type: application
version: 0.6.0
appVersion: "0.6.0"
kubeVersion: ">=1.25.0-0"
maintainers:
  - name: AlexMorbo
    email: alex@morbo.ru
sources:
  - https://github.com/alexmorbo/seasonfill
home: https://github.com/alexmorbo/seasonfill
icon: https://raw.githubusercontent.com/alexmorbo/seasonfill/main/web/src/assets/logo.svg
keywords:
  - sonarr
  - media
  - automation
  - backfill
annotations:
  artifacthub.io/license: GPL-3.0-or-later
  artifacthub.io/category: networking
  artifacthub.io/images: |
    - name: seasonfill
      image: ghcr.io/alexmorbo/seasonfill:0.6.0
    - name: seasonfill-web
      image: ghcr.io/alexmorbo/seasonfill-web:0.6.0
  artifacthub.io/changes: |
    - {kind: fixed, description: "grab counter desync: scans no longer report 'grabs_performed' for rows that silently failed to persist on UNIQUE collisions; duplicate index removed and persist failures now surface in scan output"}
    - {kind: added, description: "branding refresh: app logo, full favicon set, README banner (light/dark adaptive), Russian translation of the project README"}
    - {kind: added, description: "ArtifactHub repository ownership claim (artifacthub-repo.yml)"}
    - {kind: changed, description: "contributions now open — Issues for bugs/discussion, PRs against main; the alpha 'no external PRs' notice is gone"}
    - {kind: changed, description: "Helm install snippet in chart README renamed Terragrunt example → Terraform example; secret values now come in as sensitive Terraform variables"}
