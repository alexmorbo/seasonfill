replicaCount: 1

image:
  registry: ghcr.io
  repository: alexmorbo/seasonfill
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

updateStrategy: {type: Recreate}

terminationGracePeriodSeconds: 90

serviceAccount: {create: true, automount: false, annotations: {}, name: ""}

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile: {type: RuntimeDefault}

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  capabilities: {drop: [ALL]}

service: {type: ClusterIP, port: 8080, annotations: {}, labels: {}}

livenessProbe:
  httpGet: {path: /healthz, port: http}
  initialDelaySeconds: 10
  periodSeconds: 30
  timeoutSeconds: 3
  failureThreshold: 3

readinessProbe:
  httpGet: {path: /readyz, port: http}
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

resources:
  requests: {cpu: 50m, memory: 64Mi}
  limits: {cpu: 500m, memory: 256Mi}

nodeSelector: {}
tolerations: []
affinity: {}

extraEnv: []
extraEnvFrom: []

# Bootstrap settings. The ONLY config inputs the chart cares about —
# everything else (cron, scan tuning, dry_run, sonarr instances, runtime
# auth fields) lives in the DB and is edited via the Settings UI.
database:
  driver: postgres
  sqlite:
    path: /data/seasonfill.db

log:
  level: info
  format: json

http:
  bind: ":8080"

secrets:
  existingSecret: ""

  apiKey: ""
  webUser: ""
  webPassword: ""
  webPasswordHash: ""
  postgresDSN: ""

  keys:
    apiKey: "api-key"
    webUser: "web-user"
    webPassword: "web-password"
    webPasswordHash: "web-password-hash"
    postgresDSN: "postgres-dsn"

persistence:
  enabled: false
  accessModes:
    - ReadWriteOnce
  size: 1Gi
  storageClass: ""
  volumeName: ""
  annotations: {}

serviceMonitor:
  enabled: false
  namespace: ""
  labels: {}
  annotations: {}
  path: /metrics
  interval: 30s
  scrapeTimeout: 10s
  honorLabels: ""
  namespaceSelector: {}
  metricRelabelings: []
  relabelings: []

ingress:
  enabled: false
  className: ""
  annotations: {}
  host: ""
  tls:
    enabled: false
    secretName: ""

podDisruptionBudget:
  enabled: false
  maxUnavailable: 1

networkPolicy:
  enabled: false
  ingress:
    from: []
  egress:
    allowAll: false
    to: []

tests:
  image:
    repository: busybox
    tag: "1.36"
    pullPolicy: IfNotPresent

web:
  replicaCount: 1
  image:
    registry: ghcr.io
    repository: alexmorbo/seasonfill-web
    tag: ""
    pullPolicy: IfNotPresent
  containerPort: 8080
  service: {type: ClusterIP, port: 80, annotations: {}, labels: {}}
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 101
    runAsGroup: 101
    fsGroup: 101
    seccompProfile: {type: RuntimeDefault}
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 101
    runAsGroup: 101
    capabilities: {drop: [ALL]}
  livenessProbe:
    httpGet: {path: /healthz, port: http}
    initialDelaySeconds: 3
    periodSeconds: 10
    timeoutSeconds: 2
    failureThreshold: 3
  readinessProbe:
    httpGet: {path: /healthz, port: http}
    initialDelaySeconds: 2
    periodSeconds: 5
    timeoutSeconds: 2
    failureThreshold: 3
  resources:
    requests: {cpu: 10m, memory: 32Mi}
    limits: {cpu: 200m, memory: 128Mi}
  updateStrategy:
    type: RollingUpdate
    rollingUpdate: {maxSurge: 1, maxUnavailable: 0}
  podAnnotations: {}
  podLabels: {}
  nodeSelector: {}
  tolerations: []
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchLabels:
                app.kubernetes.io/name: seasonfill
                app.kubernetes.io/component: web
            topologyKey: kubernetes.io/hostname
