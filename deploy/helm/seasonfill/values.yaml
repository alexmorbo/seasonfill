replicaCount: 1

image:
  registry: ghcr.io
  repository: alexmorbo/seasonfill
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []
# Chart `name:` is `seasonfill-helm` (OCI artifact name disambiguator).
# Resources stay named after the app (`seasonfill`), not after the chart.
nameOverride: "seasonfill"
fullnameOverride: ""

updateStrategy: {type: Recreate}

terminationGracePeriodSeconds: 90

serviceAccount: {create: true, automount: false, annotations: {}, name: ""}

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile: {type: RuntimeDefault}

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  capabilities: {drop: [ALL]}

service: {type: ClusterIP, port: 8080, annotations: {}, labels: {}}

livenessProbe:
  httpGet: {path: /healthz, port: http}
  initialDelaySeconds: 10
  periodSeconds: 30
  timeoutSeconds: 3
  failureThreshold: 3

readinessProbe:
  httpGet: {path: /readyz, port: http}
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

resources:
  requests: {cpu: 50m, memory: 64Mi}
  limits: {cpu: 500m, memory: 256Mi}

nodeSelector: {}
tolerations: []
affinity: {}

extraEnv: []
extraEnvFrom: []

# Discovery bounded-context runtime toggles (Story 568 A2).
# discoveryPreWarm.enabled=true (default) makes the discovery Worker
# fan out RefreshSeriesText(force=false) per (item × activeUserLang)
# at the end of every successful ReplaceList — filling
# series_texts.{seriesID, activeLang} BEFORE the user clicks a tile.
# Closes the cold-lang overview miss that forces the composer's Sync
# path to fall back to en-US or spend its 5s budget on a fresh TMDB
# fetch. Rate-limited via the same 5rps limiter that paces refresh(),
# so no dual TMDB budget.
# Flip to false as a soft rollback if TMDB 429s spike post-deploy.
discoveryPreWarm:
  enabled: true

# Bootstrap settings. The ONLY config inputs the chart cares about —
# everything else (cron, scan tuning, dry_run, sonarr instances, runtime
# auth fields) lives in the DB and is edited via the Settings UI.
database:
  driver: postgres
  sqlite:
    path: /data/seasonfill.db

log:
  level: info
  format: json

http:
  bind: ":8080"

secrets:
  existingSecret: ""

  apiKey: ""
  webUser: ""
  webPassword: ""
  webPasswordHash: ""
  postgresDSN: ""
  # Set only when `oidc.enabled=true` (and `secrets.existingSecret` is empty).
  # When `secrets.existingSecret` is set, this key must come from the external
  # Secret instead.
  oidcClientSecret: ""

  keys:
    apiKey: "api-key"
    webUser: "web-user"
    webPassword: "web-password"
    webPasswordHash: "web-password-hash"
    postgresDSN: "postgres-dsn"
    oidcClientSecret: "oidc-client-secret"

# OIDC mode. Defaults to disabled; flip `enabled: true` AND
# either provide `secrets.oidcClientSecret` inline OR point at an
# `existingSecret` that contains the `oidc-client-secret` key. The rest
# of the OIDC config (issuer, client_id, redirect_url, scopes,
# username_claim, allowed_groups) is set at runtime via the Settings →
# Security UI and persists in the runtime_config DB row.
oidc:
  enabled: false
  # clientSecret is sourced from the Secret rendered by this chart
  # (key: oidc-client-secret) — DO NOT put the literal value here.
  # Set `secrets.oidcClientSecret` instead.

persistence:
  enabled: false
  accessModes:
    - ReadWriteOnce
  size: 1Gi
  storageClass: ""
  volumeName: ""
  annotations: {}

serviceMonitor:
  enabled: false
  namespace: ""
  labels: {}
  annotations: {}
  path: /metrics
  interval: 30s
  scrapeTimeout: 10s
  honorLabels: ""
  namespaceSelector: {}
  metricRelabelings: []
  relabelings: []

ingress:
  enabled: false
  className: ""
  annotations: {}
  host: ""
  tls:
    enabled: false
    secretName: ""

podDisruptionBudget:
  enabled: false
  maxUnavailable: 1

networkPolicy:
  enabled: false
  ingress:
    from: []
  egress:
    allowAll: false
    to: []

tests:
  image:
    repository: busybox
    tag: "1.36"
    pullPolicy: IfNotPresent

# Cached media layer. Posters, backdrops, cast portraits, episode
# stills, and network logos are sourced from TMDB on enrichment and
# served via GET /api/v1/media/{hash}. Bucket is a cache — missing
# objects auto-refetch from TMDB on next request.
#   s3 — recommended for production (SeaweedFS / MinIO)
#   fs — local development / single-replica deploys
#   off — disable the cached path; UI tiles fall back to the monogram
mediaStore:
  mode: "off"                      # off|s3|fs
  s3:
    endpoint: ""                   # e.g. https://s3.morbo.dev
    bucket: "seasonfill-media"
    region: "us-east-1"            # SeaweedFS ignores; minio-go signs with it
    useSSL: true
    existingSecret: ""             # keys: access-key, secret-key (see secretKeys)
    secretKeys:
      accessKey: "access-key"
      secretKey: "secret-key"
  fs:
    path: "/data/media"
    persistence:
      enabled: false
      accessModes:
        - ReadWriteOnce
      size: "10Gi"
      storageClass: ""
      annotations: {}

web:
  replicaCount: 1
  image:
    registry: ghcr.io
    repository: alexmorbo/seasonfill-web
    tag: ""
    pullPolicy: IfNotPresent
  containerPort: 8080
  service: {type: ClusterIP, port: 80, annotations: {}, labels: {}}
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 101
    runAsGroup: 101
    fsGroup: 101
    seccompProfile: {type: RuntimeDefault}
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 101
    runAsGroup: 101
    capabilities: {drop: [ALL]}
  livenessProbe:
    httpGet: {path: /healthz, port: http}
    initialDelaySeconds: 3
    periodSeconds: 10
    timeoutSeconds: 2
    failureThreshold: 3
  readinessProbe:
    httpGet: {path: /healthz, port: http}
    initialDelaySeconds: 2
    periodSeconds: 5
    timeoutSeconds: 2
    failureThreshold: 3
  resources:
    requests: {cpu: 10m, memory: 32Mi}
    limits: {cpu: 200m, memory: 128Mi}
  updateStrategy:
    type: RollingUpdate
    rollingUpdate: {maxSurge: 1, maxUnavailable: 0}
  podAnnotations: {}
  podLabels: {}
  nodeSelector: {}
  tolerations: []
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchLabels:
                app.kubernetes.io/name: seasonfill
                app.kubernetes.io/component: web
            topologyKey: kubernetes.io/hostname
