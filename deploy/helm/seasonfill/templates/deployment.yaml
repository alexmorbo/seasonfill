apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "seasonfill.fullname" . }}
  labels:
    {{- include "seasonfill.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: {{ .Values.updateStrategy.type }}
  selector:
    matchLabels:
      {{- include "seasonfill.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "seasonfill.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "seasonfill.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automount }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: seasonfill
          image: "{{ .Values.image.registry }}/{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          env:
            - name: SEASONFILL_LOG_LEVEL
              value: {{ .Values.log.level | quote }}
            - name: SEASONFILL_LOG_FORMAT
              value: {{ .Values.log.format | quote }}
            - name: SEASONFILL_HTTP_BIND
              value: {{ .Values.http.bind | quote }}
            - name: SEASONFILL_DATABASE_DRIVER
              value: {{ .Values.database.driver | quote }}
            {{- if eq .Values.database.driver "sqlite" }}
            - name: SEASONFILL_DATABASE_SQLITE_PATH
              value: {{ .Values.database.sqlite.path | quote }}
            {{- end }}
            {{- if eq .Values.database.driver "postgres" }}
            - name: SEASONFILL_DATABASE_POSTGRES_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ include "seasonfill.secretName" . }}
                  key: {{ .Values.secrets.keys.postgresDSN }}
            {{- end }}
            - name: SEASONFILL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "seasonfill.secretName" . }}
                  key: {{ .Values.secrets.keys.apiKey }}
                  optional: true
            - name: SEASONFILL_WEB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "seasonfill.secretName" . }}
                  key: {{ .Values.secrets.keys.webUser }}
                  optional: true
            - name: SEASONFILL_WEB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "seasonfill.secretName" . }}
                  key: {{ .Values.secrets.keys.webPassword }}
                  optional: true
            - name: SEASONFILL_WEB_PASSWORD_HASH
              valueFrom:
                secretKeyRef:
                  name: {{ include "seasonfill.secretName" . }}
                  key: {{ .Values.secrets.keys.webPasswordHash }}
                  optional: true
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.extraEnvFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: data
              mountPath: /data
      volumes:
        - name: tmp
          emptyDir: {}
        - name: data
          {{- if and .Values.persistence.enabled (eq .Values.database.driver "sqlite") }}
          persistentVolumeClaim:
            claimName: {{ include "seasonfill.pvcName" . }}
          {{- else }}
          emptyDir: {}
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
