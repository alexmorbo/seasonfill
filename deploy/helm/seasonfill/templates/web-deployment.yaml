apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "seasonfill.webFullname" . }}
  labels:
    {{- include "seasonfill.webLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.web.replicaCount }}
  strategy:
    {{- toYaml .Values.web.updateStrategy | nindent 4 }}
  selector:
    matchLabels:
      {{- include "seasonfill.webSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.web.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "seasonfill.webLabels" . | nindent 8 }}
        {{- with .Values.web.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      automountServiceAccountToken: false
      securityContext:
        {{- toYaml .Values.web.podSecurityContext | nindent 8 }}
      containers:
        - name: web
          image: "{{ .Values.web.image.registry }}/{{ .Values.web.image.repository }}:{{ .Values.web.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.web.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.web.containerPort }}
              protocol: TCP
          env:
            # Image's entrypoint.sh renders /etc/nginx/conf.d/seasonfill.conf
            # from /etc/nginx/templates/seasonfill.conf.template at startup via
            # envsubst. SEASONFILL_BACKEND_URL is the only substituted var.
            # Resolves to the backend Service DNS name; chart guarantees the
            # backend Service exists at this name (templates/service.yaml).
            - name: SEASONFILL_BACKEND_URL
              value: "http://{{ include "seasonfill.fullname" . }}:{{ .Values.service.port }}"
          securityContext:
            {{- toYaml .Values.web.securityContext | nindent 12 }}
          livenessProbe:
            {{- toYaml .Values.web.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.web.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.web.resources | nindent 12 }}
          volumeMounts:
            # readOnlyRootFilesystem requires writable mounts for nginx's
            # cache + pid + tmp paths and the rendered config target dir
            # (entrypoint.sh writes /etc/nginx/conf.d/seasonfill.conf).
            - name: cache
              mountPath: /var/cache/nginx
            - name: run
              mountPath: /var/run
            - name: tmp
              mountPath: /tmp
            - name: nginx-conf-d
              mountPath: /etc/nginx/conf.d
      volumes:
        - name: cache
          emptyDir: {}
        - name: run
          emptyDir: {}
        - name: tmp
          emptyDir: {}
        - name: nginx-conf-d
          emptyDir: {}
      {{- with .Values.web.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.web.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.web.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
