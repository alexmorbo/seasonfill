apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "seasonfill.webFullname" . }}
  labels:
    {{- include "seasonfill.webLabels" . | nindent 4 }}
data:
  nginx.conf: |
    # Seasonfill SPA — served from /usr/share/nginx/html with try_files
    # fallback to /index.html. nginx-unprivileged listens on 8080 by
    # default; do NOT change the port here without updating values.yaml's
    # web.containerPort and the probes.
    server {
        listen {{ .Values.web.containerPort }} default_server;
        listen [::]:{{ .Values.web.containerPort }} default_server;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        # Gzip — Vite output is mostly JS + CSS, gzips well.
        gzip on;
        gzip_vary on;
        gzip_proxied any;
        gzip_comp_level 6;
        gzip_min_length 1024;
        gzip_types
            application/javascript
            application/json
            application/xml
            text/css
            text/javascript
            text/plain
            text/xml
            image/svg+xml;

        # Security headers — applied to every response. `always` ensures
        # they are emitted even on 4xx/5xx so an intermediate proxy doesn't
        # strip them on error pages.
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        # CSP — allow self + inline styles (Tailwind generates inline
        # <style> tags for keyframes via `tailwindcss-animate`) + data:
        # images (favicon, base64 icons) + Google Fonts (009c font setup).
        # connect-src 'self' covers the same-origin /api and /webhook
        # calls; no third-party telemetry.
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

        # /healthz — static 200 used by the K8s liveness + readiness probes.
        # Independent of the bundle so a broken index.html does not cascade
        # into a CrashLoopBackOff. Matches a literal path so we don't
        # accidentally serve index.html as JSON.
        location = /healthz {
            access_log off;
            default_type text/plain;
            return 200 "ok\n";
        }

        # Hashed assets — content-hashed by Vite. Cache for one year and
        # mark immutable so the browser does not even revalidate. Use
        # try_files to return 404 for missing files (the SPA fallback
        # below must NOT swallow a missing /assets/foo.js — it would
        # cascade into the index.html document and confuse the bundler).
        location ^~ /assets/ {
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
            # Repeat security headers — add_header in a child location
            # resets the inherited set in nginx.
            add_header X-Frame-Options "DENY" always;
            add_header X-Content-Type-Options "nosniff" always;
            try_files $uri =404;
        }

        # Static files at the root that should NOT cascade into the SPA
        # fallback — robots.txt, favicon, manifest. If they exist, serve
        # them; if not, 404. Do NOT redirect to /index.html.
        location = /robots.txt { try_files $uri =404; access_log off; }
        location = /favicon.ico { try_files $uri =404; access_log off; }
        location = /manifest.webmanifest { try_files $uri =404; access_log off; }

        # SPA fallback — every other path returns /index.html so the
        # React Router takes over. no-cache on the document so a redeploy
        # is visible on the next fetch without a hard reload.
        location / {
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header Pragma "no-cache" always;
            add_header X-Frame-Options "DENY" always;
            add_header X-Content-Type-Options "nosniff" always;
            try_files $uri $uri/ /index.html;
        }
    }
