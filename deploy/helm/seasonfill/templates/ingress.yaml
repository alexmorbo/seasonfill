{{- /*
Ingress. Default off. When enabled, `.Values.ingress.host` is required
(schema enforces this; the inline `required` is belt-and-braces).

Single rendering mode (021c — the previous webhookOnly and
web.enabled branches are gone):
  /api/        -> backend Service (admin + webhook + auth endpoints)
  /healthz     -> backend Service (probes are best-effort exposed)
  /readyz      -> backend Service
  /metrics     -> backend Service
  /            -> frontend (web) Service — catch-all, must come last

The webhook lives under /api/v1/webhook/sonarr/:name (021a-2) so the
`/api/` prefix covers it. No separate /webhook entry needed.
*/ -}}
{{- if .Values.ingress.enabled -}}
{{- $svcName := include "seasonfill.fullname" . -}}
{{- $svcPort := .Values.service.port -}}
{{- $webSvcName := include "seasonfill.webFullname" . -}}
{{- $webSvcPort := .Values.web.service.port -}}
{{- $host := required "ingress.host is required when ingress.enabled is true" .Values.ingress.host -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $svcName }}
  labels:
    {{- include "seasonfill.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ $host | quote }}
      secretName: {{ required "ingress.tls.secretName is required when ingress.tls.enabled is true" .Values.ingress.tls.secretName }}
  {{- end }}
  rules:
    - host: {{ $host | quote }}
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ $svcName }}
                port:
                  number: {{ $svcPort }}
          - path: /healthz
            pathType: Exact
            backend:
              service:
                name: {{ $svcName }}
                port:
                  number: {{ $svcPort }}
          - path: /readyz
            pathType: Exact
            backend:
              service:
                name: {{ $svcName }}
                port:
                  number: {{ $svcPort }}
          - path: /metrics
            pathType: Exact
            backend:
              service:
                name: {{ $svcName }}
                port:
                  number: {{ $svcPort }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $webSvcName }}
                port:
                  number: {{ $webSvcPort }}
{{- end }}
