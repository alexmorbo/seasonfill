{{- /*
Renders a Secret with seasonfill credentials when the operator did NOT
supply a pre-existing one via `secrets.existingSecret`. The key layout
matches `secrets.keys.*` so an external Secret with the same layout
works as a drop-in.

Mutual-exclusion guards:
  - `secrets.webPassword` and `secrets.webPasswordHash` cannot both be
    set (chart fails — backend would refuse to start anyway, fail at
    install instead of CrashLoopBackOff).
  - When `secrets.existingSecret` is set, inline credentials MUST be
    empty (the chart fails to prevent silently shadowing the external
    Secret's contents — operator intent is otherwise unclear).
*/ -}}
{{- if .Values.secrets.webPassword }}
{{- if .Values.secrets.webPasswordHash }}
{{- fail "secrets.webPassword and secrets.webPasswordHash are mutually exclusive — set exactly one (or neither, to use the first-run auto-generated password flow)" -}}
{{- end }}
{{- end }}
{{- if .Values.secrets.existingSecret }}
{{- if or .Values.secrets.apiKey .Values.secrets.webUser .Values.secrets.webPassword .Values.secrets.webPasswordHash .Values.secrets.postgresDSN }}
{{- fail "secrets.existingSecret is set; inline secrets.* values (apiKey/webUser/webPassword/webPasswordHash/postgresDSN) must all be empty to prevent shadowing the external Secret" -}}
{{- end }}
{{- range .Values.instances }}
{{- if .apiKey }}
{{- fail (printf "secrets.existingSecret is set; instances[%s].apiKey must be empty (per-instance keys come from the external Secret as `%s`)" .name (include "seasonfill.sonarrSecretKey" (dict "ctx" $ "name" .name))) -}}
{{- end }}
{{- end }}
{{- else -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "seasonfill.secretName" . }}
  labels:
    {{- include "seasonfill.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.secrets.keys.apiKey }}: {{ required "secrets.apiKey is required when secrets.existingSecret is empty — set via --set secrets.apiKey=... or supply a pre-created Secret via secrets.existingSecret" .Values.secrets.apiKey | quote }}
  {{- with .Values.secrets.webUser }}
  {{ $.Values.secrets.keys.webUser }}: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.webPassword }}
  {{ $.Values.secrets.keys.webPassword }}: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.webPasswordHash }}
  {{ $.Values.secrets.keys.webPasswordHash }}: {{ . | quote }}
  {{- end }}
  {{- if eq .Values.config.database.driver "postgres" }}
  {{ .Values.secrets.keys.postgresDSN }}: {{ required "secrets.postgresDSN is required when config.database.driver=postgres and secrets.existingSecret is empty" .Values.secrets.postgresDSN | quote }}
  {{- end }}
  {{- range .Values.instances }}
  {{ include "seasonfill.sonarrSecretKey" (dict "ctx" $ "name" .name) }}: {{ required (printf "instances[%s].apiKey is required when secrets.existingSecret is empty" .name) .apiKey | quote }}
  {{- end }}
{{- end }}
