apiVersion: v1
kind: Secret
metadata:
  name: {{ include "seasonfill.fullname" . }}-env
  labels:
    {{- include "seasonfill.labels" . | nindent 4 }}
type: Opaque
stringData:
  SEASONFILL_API_KEY: {{ required ".Values.secrets.apiKey is required — override via --set secrets.apiKey=... or values file" .Values.secrets.apiKey | quote }}
  {{- if eq .Values.config.database.driver "postgres" }}
  POSTGRES_DSN: {{ required ".Values.secrets.postgresDSN is required when config.database.driver=postgres" .Values.secrets.postgresDSN | quote }}
  {{- end }}
  {{- range .Values.sonarrInstances }}
  SONARR_{{ include "seasonfill.envName" .name }}_URL: {{ .url | quote }}
  SONARR_{{ include "seasonfill.envName" .name }}_API_KEY: {{ required (printf "sonarrInstances[%s].apiKey is required — override via --set or values file" .name) .apiKey | quote }}
  {{- end }}
