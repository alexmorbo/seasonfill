{{- /*
Renders a Secret with seasonfill credentials when the operator did NOT
supply a pre-existing one via `secrets.existingSecret`. The key layout
matches `secrets.keys.*` so an external Secret with the same layout
works as a drop-in.

Mutual-exclusion guards:
  - `secrets.webPassword` and `secrets.webPasswordHash` cannot both be set.
  - When `secrets.existingSecret` is set, inline credentials MUST be empty.
*/ -}}
{{- if .Values.secrets.webPassword }}
{{- if .Values.secrets.webPasswordHash }}
{{- fail "secrets.webPassword and secrets.webPasswordHash are mutually exclusive — set exactly one (or neither, to use the first-run auto-generated password flow)" -}}
{{- end }}
{{- end }}
{{- if .Values.oidc.enabled }}
{{- if not .Values.secrets.existingSecret }}
{{- if not .Values.secrets.oidcClientSecret }}
{{- fail "oidc.enabled=true requires secrets.oidcClientSecret (or an existingSecret with key 'oidc-client-secret')" -}}
{{- end }}
{{- end }}
{{- end }}
{{- if .Values.secrets.existingSecret }}
{{- if or .Values.secrets.apiKey .Values.secrets.webUser .Values.secrets.webPassword .Values.secrets.webPasswordHash .Values.secrets.postgresDSN .Values.secrets.oidcClientSecret }}
{{- fail "secrets.existingSecret is set; inline secrets.* values (apiKey/webUser/webPassword/webPasswordHash/postgresDSN) must all be empty to prevent shadowing the external Secret" -}}
{{- end }}
{{- else -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "seasonfill.secretName" . }}
  labels:
    {{- include "seasonfill.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- with .Values.secrets.apiKey }}
  {{ $.Values.secrets.keys.apiKey }}: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.webUser }}
  {{ $.Values.secrets.keys.webUser }}: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.webPassword }}
  {{ $.Values.secrets.keys.webPassword }}: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.webPasswordHash }}
  {{ $.Values.secrets.keys.webPasswordHash }}: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.oidcClientSecret }}
  {{ $.Values.secrets.keys.oidcClientSecret }}: {{ . | quote }}
  {{- end }}
  {{- if eq .Values.database.driver "postgres" }}
  {{ .Values.secrets.keys.postgresDSN }}: {{ required "secrets.postgresDSN is required when database.driver=postgres and secrets.existingSecret is empty" .Values.secrets.postgresDSN | quote }}
  {{- end }}
{{- end }}
