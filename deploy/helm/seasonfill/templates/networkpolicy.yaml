{{- /*
NetworkPolicy. Default off — meaningful only on clusters whose CNI
enforces NetworkPolicy (Cilium, Calico, etc.). Default-deny ingress +
egress, with explicit allows.

Ingress: any selectors the operator supplies under
.Values.networkPolicy.ingress.from. Typical homelab setup: allow from
the ingress-nginx namespace. The webhook used to have a separate
`webhookSources` entry; from 021c it shares the API auth surface and
needs no separate ingress rule.

Egress is explicit:
  - DNS to kube-dns (UDP 53 + TCP 53).
  - Operator-supplied entries for Postgres / Sonarr / proxies under
    .Values.networkPolicy.egress.to.
  - Or .Values.networkPolicy.egress.allowAll: true to short-circuit
    when the operator wants to manage egress out-of-band.
*/ -}}
{{- if .Values.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "seasonfill.fullname" . }}
  labels:
    {{- include "seasonfill.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "seasonfill.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  {{- with .Values.networkPolicy.ingress.from }}
  ingress:
    - from:
        {{- toYaml . | nindent 8 }}
      ports:
        - protocol: TCP
          port: 8080
  {{- end }}
  egress:
    {{- if .Values.networkPolicy.egress.allowAll }}
    - {}
    {{- else }}
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    {{- with .Values.networkPolicy.egress.to }}
    {{- range . }}
    - {{ toYaml . | nindent 6 | trim }}
    {{- end }}
    {{- end }}
    {{- end }}
{{- end }}
