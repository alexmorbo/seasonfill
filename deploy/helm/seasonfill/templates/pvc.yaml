{{- /*
PersistentVolumeClaim for SQLite-mode persistence. Rendered only when
both flags are on:
  - .Values.persistence.enabled
  - .Values.database.driver == "sqlite"

ReadWriteOnce is intentional. The service is a singleton (replicas: 1)
with strategy.type=Recreate (006d). RWX would be misleading — only one
pod can ever hold the lock. ReadWriteOnce + Recreate is the supported
pair: the PVC detaches from the old pod cleanly before the new one
attaches.

For Postgres mode (default), this template renders nothing — the DB
state lives in the external Postgres server, not on a local volume.
*/ -}}
{{- if and .Values.persistence.enabled (eq .Values.database.driver "sqlite") -}}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "seasonfill.pvcName" . }}
  labels:
    {{- include "seasonfill.labels" . | nindent 4 }}
  {{- with .Values.persistence.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  accessModes:
    {{- toYaml .Values.persistence.accessModes | nindent 4 }}
  resources:
    requests:
      storage: {{ .Values.persistence.size | quote }}
  {{- with .Values.persistence.storageClass }}
  {{- if (eq "-" .) }}
  storageClassName: ""
  {{- else }}
  storageClassName: {{ . | quote }}
  {{- end }}
  {{- end }}
  {{- with .Values.persistence.volumeName }}
  volumeName: {{ . | quote }}
  {{- end }}
{{- end }}
