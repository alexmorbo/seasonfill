apiVersion: v1
kind: Service
metadata:
  name: {{ include "seasonfill.webFullname" . }}
  labels:
    {{- include "seasonfill.webLabels" . | nindent 4 }}
    {{- with .Values.web.service.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.web.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.web.service.type }}
  ports:
    - port: {{ .Values.web.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "seasonfill.webSelectorLabels" . | nindent 4 }}
