# Seasonfill — docker-compose deploy.
#
# Quick start:
#   1. cp .env.example .env
#   2. docker compose up -d
#   3. docker compose logs -f backend  # grab the FIRST-RUN api key + password
#   4. open http://localhost:8080 — log in with admin/admin, change in Settings → Security
#   5. Add your Sonarr instances at /settings
#
# Security defaults:
#   - Backend container does NOT publish a host port. The frontend
#     proxies /api, /auth, /webhook, /readyz, /metrics to it inside
#     the compose network. Only the frontend's :8080 is exposed.
#
# Authentication mode (Forms / Basic / None) configurable in UI Settings → Security,
# defaults to Forms. Change at runtime — no restart needed.

services:
  backend:
    image: ghcr.io/alexmorbo/seasonfill:${TAG:-latest}
    container_name: seasonfill-backend
    restart: unless-stopped
    environment:
      SEASONFILL_DATABASE_DRIVER: ${SEASONFILL_DATABASE_DRIVER:-sqlite}
      SEASONFILL_DATABASE_SQLITE_PATH: ${SEASONFILL_DATABASE_SQLITE_PATH:-/data/seasonfill.db}
      SEASONFILL_DATABASE_POSTGRES_DSN: ${SEASONFILL_DATABASE_POSTGRES_DSN:-}
      SEASONFILL_HTTP_BIND: ${SEASONFILL_HTTP_BIND:-:8080}
      SEASONFILL_LOG_LEVEL: ${SEASONFILL_LOG_LEVEL:-info}
      SEASONFILL_LOG_FORMAT: ${SEASONFILL_LOG_FORMAT:-json}
      SEASONFILL_API_KEY: ${SEASONFILL_API_KEY:-}
      # CHANGE ME — example credentials; rotate via UI Settings → Security after first login
      SEASONFILL_WEB_USER: ${SEASONFILL_WEB_USER:-admin}
      SEASONFILL_WEB_PASSWORD: ${SEASONFILL_WEB_PASSWORD:-admin}
      SEASONFILL_WEB_PASSWORD_HASH: ${SEASONFILL_WEB_PASSWORD_HASH:-}
      # Uncomment AND set when switching Settings → Security → Authentication to `OIDC`.
      # OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
    volumes:
      - seasonfill-data:/data

  frontend:
    image: ghcr.io/alexmorbo/seasonfill-web:${TAG:-latest}
    container_name: seasonfill-frontend
    restart: unless-stopped
    environment:
      SEASONFILL_BACKEND_URL: http://backend:8080
    ports:
      - "${WEB_PORT:-8080}:8080"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8080/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  seasonfill-data:
    driver: local

# Example Keycloak side-service for testing OIDC mode. Uncomment to enable.
# After `docker compose up -d`, open http://localhost:8180, log in as admin/admin,
# create a realm `homelab`, a client `seasonfill` with redirect URI
# `http://localhost:8080/api/v1/auth/oidc/callback`, copy the client secret into
# `.env` as OIDC_CLIENT_SECRET=..., then configure Seasonfill in Settings →
# Security with issuer `http://keycloak:8080/realms/homelab`.
#
#   keycloak:
#     image: quay.io/keycloak/keycloak:25.0
#     container_name: seasonfill-keycloak
#     command: ["start-dev"]
#     environment:
#       KEYCLOAK_ADMIN: admin
#       KEYCLOAK_ADMIN_PASSWORD: admin
#     ports:
#       - "8180:8080"
