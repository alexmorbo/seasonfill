version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - unconvert
    - bodyclose
    - noctx
    - errorlint
    - nilerr
    - revive
    - gocritic
    - forbidigo
    - modernize
  settings:
    forbidigo:
      # F-4c: lock in the F-4b-8 DomainLogger migration. Forbids ad-hoc
      # print/log paths that bypass the structured logging pipeline.
      # Path-scoped exclusions below carve out the established CLI
      # surfaces and the existing nil-logger fallbacks (handler/
      # subscriber constructors). New files in fresh paths must wire
      # through sharedports.DomainLogger.
      forbid:
        - pattern: '^fmt\.Print(ln|f)?$'
          msg: 'use sharedports.DomainLogger instead of fmt.Print* — runtime output must flow through structured logging (story F-4c)'
        - pattern: '^log\.(Print(ln|f)?|Fatal(ln|f)?|Panic(ln|f)?)$'
          msg: 'use sharedports.DomainLogger instead of standard log package — runtime output must flow through structured logging (story F-4c)'
        - pattern: '^fmt\.Fprint(ln|f)?$'
          msg: 'use sharedports.DomainLogger instead of fmt.Fprint* — CLI command paths are whitelisted (story F-4c)'
        - pattern: '^slog\.Default$'
          msg: 'wrap with sharedports.DomainLogger(slog.Default(), "domain") — bare slog.Default() loses domain attribution (story F-4c)'
        - pattern: '^slog\.New$'
          msg: 'construct logger via internal/logger helpers — bare slog.New bypasses contextHandler wrapping (story F-4c)'
    revive:
      rules:
        - name: exported
          disabled: true
        - name: package-comments
          disabled: true
        # use-any: reject the literal `interface{}` token. `any` is the
        # Go 1.18+ alias and is the only spelling allowed in this
        # codebase. Implemented via revive's purpose-built `use-any`
        # rule (forbidigo can't match type literals — it operates on
        # identifiers/calls only).
        - name: use-any
        # Note: the bare-id-int regression guard (story 407 A-5e) lives
        # in tests/lint_bare_id_int_test.go behind the `lint` build
        # tag and runs via `make test-lint-rule`. It cannot live here
        # for the same reason as use-any above — neither forbidigo
        # nor revive can match struct-field or function-param type
        # expressions. The AST scan rejects bare int/int64/string for
        # fields/params named SeriesID, EpisodeID, SonarrSeriesID,
        # SonarrEpisodeID, TMDBID, TVDBID, IMDBID, QbitHash and
        # InstanceName in the domain/ and application/ trees.
    gocritic:
      # Only non-default checks are listed; defaults (appendAssign,
      # argOrder, badCall, badCond, dupArg, dupBranchBody, dupCase,
      # exitAfterDefer, flagDeref, sloppyLen, ...) are already on and
      # listing them produces "no need to enable" warnings.
      enabled-checks:
        - emptyFallthrough
        - nilValReturn
        - sortSlice
        - unnecessaryDefer
    modernize:
      # F-1 follow-up (story 417): modernize is allow-by-default in
      # golangci-lint v2 — the settings schema only accepts a `disable`
      # block-list. Disable analyzers that require a codebase-wide
      # audit before flipping on:
      #   - slicescontains: touches hot loops (perf review separately)
      #   - omitzero:       struct-tag overhaul
      disable:
        - slicescontains
        - omitzero
  exclusions:
    paths:
      - web/node_modules
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - bodyclose
      - path: fixtures
        linters:
          - misspell
      # Generated code is allowed to keep interface{} — the use-any
      # rule targets human-authored code only.
      - path: '\.pb\.go$'
        linters:
          - revive
        text: 'use-any'
      - path: '_gen\.go$'
        linters:
          - revive
        text: 'use-any'
      - path: 'mocks/'
        linters:
          - revive
        text: 'use-any'
      # Regression test deliberately contains `interface{}` to verify
      # the lint rule actually rejects it. The test file itself must
      # not trip the lint run; the assertion runs golangci-lint as a
      # subprocess against a temp fixture file outside the module.
      - path: 'tests/lint_use_any_test\.go$'
        linters:
          - revive
        text: 'use-any'
      # F-4c forbidigo carve-outs. Each block locks in an existing
      # legitimate use of the otherwise-banned identifier:
      #   * cmd/server/ + internal/wiring/apikey.go — operator-facing CLI
      #     stdout/stderr (reset-password, auth-mode, backfill-assets,
      #     reparse, apikey bootstrap, main usage/fatal).
      #   * internal/grab/app/evaluate/error_detail.go — fmt.Fprintf
      #     into a bytes.Buffer for error-detail rendering, not stdout.
      #     (Moved from application/evaluate in story 432 A-1-6.)
      #   * internal/logger/ — the logger factory itself (slog.New
      #     contextHandler wrap) and the GORM adapter nil-fallback.
      #   * internal/shared/ports/context.go — LoggerFromContext nil
      #     fallback (background scope).
      #   * interface/http/handlers/, internal/shared/reload/,
      #     infrastructure/tmdb/, internal/runtime/, application/,
      #     cmd/server/ — established nil-logger fallback pattern
      #     (constructor accepts *slog.Logger; nil → slog.Default()).
      - path: 'cmd/server/'
        linters:
          - forbidigo
        text: 'fmt\.Fprint'
      - path: 'internal/wiring/apikey\.go'
        linters:
          - forbidigo
        text: 'fmt\.Fprint'
      - path: 'internal/grab/app/evaluate/error_detail\.go'
        linters:
          - forbidigo
        text: 'fmt\.Fprint'
      # D-1-2 (story 455): the Atlas schema loader is a dev-time CLI
      # that Atlas spawns via `data "external_schema"` — it must
      # write SQL DDL to stdout and human-readable errors to stderr.
      # DomainLogger isn't available outside the running service.
      - path: 'infrastructure/database/schema/cmd/loader/'
        linters:
          - forbidigo
        text: 'fmt\.Fprint'
      - path: 'internal/logger/'
        linters:
          - forbidigo
        text: 'slog\.(Default|New)'
      - path: 'internal/shared/ports/context\.go'
        linters:
          - forbidigo
        text: 'slog\.Default'
      - path: 'internal/shared/http/handlers/'
        linters:
          - forbidigo
        text: 'slog\.Default'
      - path: 'internal/shared/reload/'
        linters:
          - forbidigo
        text: 'slog\.Default'
      - path: 'infrastructure/tmdb/'
        linters:
          - forbidigo
        text: 'slog\.Default'
      - path: 'internal/runtime/'
        linters:
          - forbidigo
        text: 'slog\.Default'
      - path: 'application/'
        linters:
          - forbidigo
        text: 'slog\.Default'
      - path: 'cmd/server/'
        linters:
          - forbidigo
        text: 'slog\.Default'
      # internal/mediaproxy/ inherits the application/ carve-out — the
      # downloader / on-demand fetcher constructors accept *slog.Logger
      # and fall back to slog.Default() wrapped via
      # sharedports.DomainLogger when nil. Established pattern moved
      # from application/media in story 427 (A-1-1).
      - path: 'internal/mediaproxy/'
        linters:
          - forbidigo
        text: 'slog\.Default'
      # internal/admin/ inherits the application/ carve-out — Bootstrap
      # and OIDCLoginUseCase constructors accept *slog.Logger and fall
      # back to sharedports.DomainLogger(slog.Default(), "auth") when
      # nil. Established pattern moved from application/auth in story
      # 428 (A-1-2).
      - path: 'internal/admin/'
        linters:
          - forbidigo
        text: 'slog\.Default'
      # internal/grab/ inherits the same carve-out — UseCase (app),
      # GrabRepository (persistence), and GrabHandler / GrabEpisodeFiles
      # constructors accept *slog.Logger and fall back to slog.Default()
      # wrapped via sharedports.DomainLogger when nil. Established
      # pattern moved from application/grab + interface/http/handlers
      # in story 431 (A-1-5).
      - path: 'internal/grab/'
        linters:
          - forbidigo
        text: 'slog\.Default'
      # internal/watchdog/ inherits the same carve-out — UseCase
      # (regrab + settings) constructors accept *slog.Logger and fall
      # back to sharedports.DomainLogger(slog.Default(), "watchdog")
      # when nil. Established pattern moved from application/regrab
      # in story 433 (A-1-7).
      - path: 'internal/watchdog/'
        linters:
          - forbidigo
        text: 'slog\.Default'
      # internal/shared/clients/ inherits the same carve-out — TMDB
      # and OMDb client constructors accept *slog.Logger and fall back
      # to sharedports.DomainLogger(slog.Default(), "tmdb"/"omdb") when
      # nil. Established pattern moved from infrastructure/tmdb +
      # infrastructure/omdb in story 435 (A-1-9).
      - path: 'internal/shared/clients/'
        linters:
          - forbidigo
        text: 'slog\.Default'
      # internal/enrichment/ inherits the application/ carve-out — the
      # enrichment dispatcher, OMDb budget, OMDb / person / series
      # workers, cold-start sweeper, and externalservices use-case all
      # accept *slog.Logger and fall back to sharedports.DomainLogger(
      # slog.Default(), "enrichment"/"omdb") when nil. Established
      # pattern moved from application/enrichment +
      # application/externalservices + application/people in story
      # 436 (A-1-10).
      - path: 'internal/enrichment/'
        linters:
          - forbidigo
        text: 'slog\.Default'
      # internal/catalog/ inherits the application/ carve-out — the
      # instance UseCase constructor accepts *slog.Logger and falls
      # back to sharedports.DomainLogger(slog.Default(), "admin") when
      # nil. Established pattern moved from application/instance +
      # domain/{series,instance,webhook,release} in story 441 (A-1-15).
      - path: 'internal/catalog/'
        linters:
          - forbidigo
        text: 'slog\.Default'
      # internal/seriesdetail/ inherits the application/ carve-out — the
      # Composer, CastComposer, and MediaResolver constructors all
      # accept *slog.Logger and fall back to sharedports.DomainLogger(
      # slog.Default(), "composer") when nil. Established pattern moved
      # from application/seriesdetail in story 445 (A-1-19).
      - path: 'internal/seriesdetail/'
        linters:
          - forbidigo
        text: 'slog\.Default'
      # Tests freely use slog.Default()/New for fixtures.
      - path: _test\.go
        linters:
          - forbidigo

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/alexmorbo/seasonfill

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
