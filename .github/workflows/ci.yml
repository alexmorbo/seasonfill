name: CI

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Single source of truth for the integration-test package specs. Each lane's
# `go test` step runs exactly these specs, and the drift guard (integration-sqlite
# job) derives its EXPECTED set from the SAME three variables via `go list`. Because
# EXPECTED is computed from the specs that are actually executed — not a separately
# maintained list — a package cannot satisfy the guard without genuinely running in
# some lane. Adding an integration-tagged package therefore requires adding it here
# (where it runs); listing it only in the guard is impossible.
env:
  INTEGRATION_PKGS_SQLITE: "./internal/shared/testhelpers ./internal/discovery/app/... ./internal/discovery/persistence ./internal/mediaproxy/infrastructure ./tests/..."
  INTEGRATION_PKGS_CMDSERVER: "./cmd/server/..."
  INTEGRATION_PKGS_POSTGRES: "./internal/shared/testhelpers ./internal/discovery/app/... ./internal/admin/persistence/... ./internal/catalog/persistence/... ./internal/enrichment/persistence/... ./internal/grab/persistence/... ./internal/watchdog/persistence/... ./tests/integration/..."

jobs:
  lint:
    name: Lint
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.5"
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2

  unit:
    name: Unit
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.5"
          cache: true

      - name: Cache Go build (race)
        uses: actions/cache@v4
        with:
          path: ~/.cache/go-build
          key: gobuild-race-${{ runner.os }}-go1.26.5-${{ hashFiles('**/go.sum') }}
          restore-keys: gobuild-race-${{ runner.os }}-

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test (unit)
        run: |
          PKGS=$(go list ./... | grep -v '/cmd/')
          go test -short -race -timeout 5m -coverprofile=coverage.out $PKGS

      - name: Coverage
        run: go tool cover -func=coverage.out | tail -1

      - name: Coverage gate
        run: |
          # Exclude generated files (swagger init, moq mocks) from the gate.
          # These files contain no testable logic; their 0% coverage drags
          # the ratio below the meaningful threshold after A-1-27 moved
          # dataports out of application/ports/ into internal/shared/dataports/.
          #
          # D-2 (463a) lowered the gate from 75% to 55% pending consumer
          # rewrites in D-3..D-7. D-8 (story closure) restored 75% after
          # D-3..D-7 un-skipped the rewritten tests (enrichment / catalog /
          # admin+auth / grab+watchdog / i18n+seriesdetail). Live measure
          # at D-8 close: 75.7% with the two excludes below.
          grep -v "docs/docs.go" coverage.out \
            | grep -v "sonarr_mock.go" \
            > coverage_gate.out
          PCT=$(go tool cover -func=coverage_gate.out | tail -1 | awk '{print $3}' | sed 's/%//')
          echo "Total coverage (excl. generated): ${PCT}%"
          awk "BEGIN { exit !(${PCT} >= 75) }" || (echo "Coverage below 75%"; exit 1)

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-unit
          path: coverage.out

  openapi:
    name: OpenAPI drift
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.5"
          cache: true
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json
      - name: Install module tools
        run: go install tool
      - name: Drift check
        run: make openapi-check

  integration-sqlite:
    name: Integration (SQLite)
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.5"
          cache: true

      - name: Cache Go build (race)
        uses: actions/cache@v4
        with:
          path: ~/.cache/go-build
          key: gobuild-race-${{ runner.os }}-go1.26.5-${{ hashFiles('**/go.sum') }}
          restore-keys: gobuild-race-${{ runner.os }}-

      - name: Verify integration package coverage (drift guard)
        run: |
          set -euo pipefail

          # Find all .go files whose //go:build constraint INCLUDES the `integration`
          # tag as a positive term, excluding web/ .git/ vendor/. Extract unique
          # package directories and verify via go list. Fail on any go list errors
          # (import issues, unreachable packages).
          #
          # The discovery regex (grep -P) matches the `integration` tag as a whole
          # word so it catches compound constraints — `//go:build integration`,
          # `//go:build integration && linux`, `//go:build linux || integration` —
          # while deliberately NOT matching:
          #   * `integration_e2e` — a genuinely distinct tag run only by nightly-deep
          #     (the \b after `integration` fails against the `_`), and
          #   * `!integration`   — a negated constraint (the (?<!!) lookbehind rejects it).
          # An exact-line match previously let `integration && …` files escape the
          # scan entirely, making the guard green while those packages never ran.
          # Discovery is intentionally broad: a package it finds must still appear in
          # one of the INTEGRATION_PKGS_* specs so it is executed under `-tags
          # integration`. Every lane selects the sqlite/postgres backend via the
          # SEASONFILL_TEST_POSTGRES_* env, NOT a build tag — so gating test files
          # behind an extra build tag that no lane sets (e.g. a bespoke `postgres`
          # tag) would keep them from running; use `-tags integration` + env instead.

          # Fail closed if grep lacks PCRE (-P): without it the find below would match
          # nothing, emptying FILES and passing the guard having scanned zero files.
          if ! printf '//go:build integration\n' | grep -qP '^//go:build .*(?<!!)\bintegration\b'; then
            echo "FAILURE: grep -P (PCRE) unavailable — cannot scan build constraints"
            exit 1
          fi

          echo "Scanning for integration-tagged packages repo-wide..."

          # Find .go files whose //go:build constraint includes the integration tag
          FILES=$(find . -type f -name "*.go" \
            ! -path "./web/*" ! -path "./.git/*" ! -path "./vendor/*" \
            -exec grep -lP '^//go:build .*(?<!!)\bintegration\b' {} \; 2>/dev/null || true)

          # If no files found, guard is trivially OK
          if [ -z "$FILES" ]; then
            echo "OK: no integration-tagged files found"
            exit 0
          fi

          # Extract unique package directories
          DIRS=$(echo "$FILES" | xargs -n1 dirname | sort -u)

          # Resolve packages via go list, fail on errors
          ACTUAL=""
          for dir in $DIRS; do
            # Normalize directory path to ./path form
            pkg_path="${dir#./}"
            pkg_path="./${pkg_path#./}"

            # go list will output full import path; redirect stderr to temp file
            # so benign "go: downloading" messages don't pollute ACTUAL package list.
            # On error, show stderr and fail.
            list_err=$(mktemp)
            if ! list_out=$(go list -tags integration "$pkg_path" 2>"$list_err"); then
              echo "FAILURE: go list error in $pkg_path:"
              cat "$list_err"
              rm -f "$list_err"
              exit 1
            fi
            rm -f "$list_err"
            ACTUAL="${ACTUAL}${list_out}"$'\n'
          done

          # Normalize ACTUAL: convert import paths to relative paths, sort, deduplicate
          ACTUAL=$(echo "$ACTUAL" | sed 's,^github.com/alexmorbo/seasonfill/,./,' | grep -v '^$' | sort -u)

          # EXPECTED = the union of the packages EVERY integration lane actually
          # executes, resolved from the SAME shared specs the test steps run:
          #   * INTEGRATION_PKGS_SQLITE     — sqlite lane, main step
          #   * INTEGRATION_PKGS_CMDSERVER  — sqlite lane, dedicated cmd/server step
          #   * INTEGRATION_PKGS_POSTGRES   — postgres lane
          # Deriving EXPECTED from these (rather than a hand-typed copy) is what makes
          # the guard a real coverage proof: every package it accepts is one a lane
          # runs, and any integration-tagged package absent from all three specs falls
          # out of EXPECTED and trips the drift check below.
          EXPECTED=$(go list -tags integration \
            $INTEGRATION_PKGS_SQLITE \
            $INTEGRATION_PKGS_CMDSERVER \
            $INTEGRATION_PKGS_POSTGRES \
            2>/dev/null | sed 's,^github.com/alexmorbo/seasonfill/,./,' | sort -u)

          # Check for drift: packages in ACTUAL but not in EXPECTED
          MISSING=$(comm -23 <(printf '%s\n' "$ACTUAL") <(printf '%s\n' "$EXPECTED") | grep -v '^$' || true)
          if [ -n "$MISSING" ]; then
            echo "DRIFT: integration-tagged packages that no lane executes:"
            echo "$MISSING"
            echo ""
            echo "Action: either (a) add the package to the matching INTEGRATION_PKGS_* list in .github/workflows/ci.yml (env: block) so its tests ACTUALLY RUN, or (b) remove the integration build tag if the package is not meant to run. Adding it only to a reference list is not possible — EXPECTED is derived from the specs the test steps execute."
            exit 1
          fi

          echo "OK: integration package coverage is complete"
          echo "  Actual tagged packages: $(echo "$ACTUAL" | wc -l)"
          echo "  Expected coverage: $(echo "$EXPECTED" | wc -l)"

      - name: Test (integration, sqlite only)
        run: go test -tags integration -race -timeout 15m $INTEGRATION_PKGS_SQLITE

      # cmd/server runs in its OWN step, sequentially after the packages above.
      # Its reload E2E suite boots the full server ~13 times (SQLite migrations +
      # complete wiring, each under -race). On a 2-vCPU runner those boots must
      # not contend with the other integration binaries that `go test` would
      # otherwise schedule in parallel across GOMAXPROCS — the contention slows
      # each boot past the test's readiness budget and flakes the lane. A
      # dedicated step gives the boots the whole runner, matching the green
      # isolated runs.
      - name: Test (integration, sqlite only — cmd/server)
        run: go test -tags integration -race -timeout 15m $INTEGRATION_PKGS_CMDSERVER

  integration-postgres:
    name: Integration (Postgres via services container)
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')))
    runs-on: ubuntu-latest
    # GitHub Actions service container shared across all packages in this job.
    # Switched from per-process testcontainers (sync.Once-per-test-binary) because
    # `go test ./pkgA ./pkgB` spawns one process per package; each process booted
    # and then terminated its own container, leaving later packages with a stale
    # cached port and "connection refused". One services container shared across
    # the job sidesteps the lifecycle entirely. Per-test DB isolation is preserved
    # by testhelpers.PostgresContainer.NewDB which CREATEs a fresh
    # `seasonfill_test_<rand>` database per call.
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: seasonfill
          POSTGRES_PASSWORD: seasonfill
          POSTGRES_DB: seasonfill_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U seasonfill -d seasonfill_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.5"
          cache: true

      - name: Cache Go build (race)
        uses: actions/cache@v4
        with:
          path: ~/.cache/go-build
          key: gobuild-race-${{ runner.os }}-go1.26.5-${{ hashFiles('**/go.sum') }}
          restore-keys: gobuild-race-${{ runner.os }}-

      - name: Test (integration, postgres backend)
        env:
          SEASONFILL_TEST_POSTGRES_ENABLE: "1"
          SEASONFILL_TEST_POSTGRES_DSN: "postgres://seasonfill:seasonfill@localhost:5432/seasonfill_test?sslmode=disable"
          GOMAXPROCS: "4"
        run: |
          PKGS=$(go list -tags integration $INTEGRATION_PKGS_POSTGRES)
          go test -tags integration -race -timeout 20m -parallel=4 $PKGS

  nightly-deep:
    name: Nightly deep
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.5"
          cache: true

      - name: Test (integration + e2e)
        run: |
          PKGS=$(go list ./... | grep -v '/cmd/')
          go test -tags "integration integration_e2e" -race -timeout 30m -coverprofile=coverage-deep.out $PKGS

      - name: Coverage summary
        if: always()
        run: |
          if [ -f coverage-deep.out ]; then
            go tool cover -func=coverage-deep.out | tail -1
          fi

      - name: Upload nightly coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-nightly
          path: coverage-deep.out
          if-no-files-found: ignore

  migrations-diff-check:
    name: D-1 acceptance — atlas diff/lint gate
    # Story 461 (D-1-8) — final D-1 acceptance gate.
    # Proves that schema.go is fully expressed by all committed
    # migrations on both Postgres and SQLite. The job runs:
    #   1. `atlas migrate lint --latest 19` per dialect (D-8 closure
    #      raised from 15 to 19 — 000016 app_config + 000017 grab_audit
    #      + 000018 qbit_runtime + 000019 media_assets landed in D-5/D-6/D-7)
    #   2. `make migrations-diff-check` (idempotency probe)
    # Independent of unit/integration jobs — no needs:[] dependency so a
    # broken schema fails fast without waiting for the long test matrix.
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: atlas
          POSTGRES_PASSWORD: atlas
          POSTGRES_DB: atlas_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U atlas -d atlas_dev"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.5"
          cache: true

      - name: Install atlas CLI
        run: make atlas-install

      - name: atlas migrate lint (postgres, all 19)
        env:
          SEASONFILL_DATABASE_DSN: postgres://atlas:atlas@localhost:5432/atlas_dev?sslmode=disable
        run: atlas migrate lint --env postgres --latest 19

      - name: atlas migrate lint (sqlite, all 19)
        run: atlas migrate lint --env sqlite --latest 19

      - name: migrations-diff-check (both dialects)
        env:
          SEASONFILL_DATABASE_DSN: postgres://atlas:atlas@localhost:5432/atlas_dev?sslmode=disable
        run: make migrations-diff-check

  vuln:
    name: Vuln Scan
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.5"
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        run: cd web && npm ci

      - name: Run vulnerability scanners
        run: make vuln

  docker:
    name: Docker
    runs-on: ubuntu-latest
    needs: [lint, unit, integration-sqlite, integration-postgres, openapi, vuln]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,format=short
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deploy/docker/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-web:
    name: Build web image
    runs-on: ubuntu-latest
    needs: [lint, unit, integration-sqlite, integration-postgres, openapi, vuln]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          # Same owner, distinct repo path: `<owner>/<repo>-web`.
          images: ghcr.io/${{ github.repository }}-web
          tags: |
            type=sha,format=short
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Compute app version label
        id: appver
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_SHA:0:7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: web
          file: web/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_APP_VERSION=${{ steps.appver.outputs.version }}
            GIT_SHA=${{ github.sha }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max
