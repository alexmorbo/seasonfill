name: CI

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.3"
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.12.2

  unit:
    name: Unit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.3"
          cache: true

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test (unit)
        run: |
          PKGS=$(go list ./... | grep -v '/cmd/')
          go test -short -race -timeout 5m -coverprofile=coverage.out $PKGS

      - name: Coverage
        run: go tool cover -func=coverage.out | tail -1

      - name: Coverage gate
        run: |
          PCT=$(go tool cover -func=coverage.out | tail -1 | awk '{print $3}' | sed 's/%//')
          echo "Total coverage: ${PCT}%"
          awk "BEGIN { exit !(${PCT} >= 75) }" || (echo "Coverage below 75%"; exit 1)

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v5
        with:
          name: coverage-unit
          path: coverage.out

  openapi:
    name: OpenAPI drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.3"
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package.json
      - name: Install module tools
        run: go install tool
      - name: Drift check
        run: make openapi-check

  integration:
    name: Integration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.3"
          cache: true

      - name: Test (integration)
        run: |
          PKGS=$(go list ./... | grep -v '/cmd/')
          go test -timeout 10m $PKGS

  docker:
    name: Docker
    runs-on: ubuntu-latest
    needs: [lint, unit, integration, openapi]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,format=short
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-web:
    name: Build web image
    runs-on: ubuntu-latest
    needs: [lint, unit, integration, openapi]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          # Same owner, distinct repo path: `<owner>/<repo>-web`.
          images: ghcr.io/${{ github.repository }}-web
          tags: |
            type=sha,format=short
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: web
          file: web/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_APP_VERSION=${{ github.sha }}
            GIT_SHA=${{ github.sha }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max

  helm-chart:
    name: Helm chart
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.2

      - name: Write CI values fixture
        run: |
          cat > /tmp/values-ci.yaml <<'EOF'
          secrets:
            apiKey: ci
            webhookSecret: testwebhook
          config:
            database:
              driver: sqlite
            webhook:
              allowedInstances: [main]
          sonarrInstances:
            - name: main
              url: http://example
              apiKey: ci
              timeout: 30s
              dryRun: null
              tags:
                mode: all
                include: []
                exclude: []
              search:
                requireAllAired: false
                skipSpecials: true
                skipAnime: true
                minCustomFormatScore: 0
              ranking:
                indexerPriorityEnabled: true
                originBonus: 1.0
              limits:
                scanMaxSeries: 100
                maxGrabsPerScan: 10
              rateLimit:
                rps: 5
                burst: 10
              cooldown:
                mode: smart
                seriesAfterGrab: 24h
                guidAfterFailedGrab: 72h
              retry:
                maxAttempts: 3
                initialBackoff: 1s
                maxBackoff: 30s
              healthCheck:
                recheckIntervalAuth: 5m
                recheckIntervalNetwork: 1m
          EOF

      - name: helm lint
        run: helm lint deploy/helm/seasonfill -f /tmp/values-ci.yaml

      - name: helm template (defaults — core set present, optional absent)
        run: |
          helm template seasonfill-test deploy/helm/seasonfill \
            -f /tmp/values-ci.yaml \
            --set config.database.driver=sqlite \
            > /tmp/render-default.yaml
          for kind in Deployment Service ConfigMap Secret ServiceAccount; do
            grep -q "kind: $kind" /tmp/render-default.yaml || { echo "MISSING $kind"; exit 1; }
          done
          ! grep -E "kind: (PersistentVolumeClaim|ServiceMonitor|Ingress|PodDisruptionBudget|NetworkPolicy)" /tmp/render-default.yaml

      - name: helm template (each optional toggle renders)
        run: |
          set -e
          base="helm template seasonfill-test deploy/helm/seasonfill -f /tmp/values-ci.yaml"

          $base --set config.database.driver=sqlite --set persistence.enabled=true \
            | grep -q "kind: PersistentVolumeClaim"

          $base --set serviceMonitor.enabled=true | grep -q "kind: ServiceMonitor"

          $base --set ingress.enabled=true \
            --set ingress.hosts[0].host=seasonfill.example.com \
            --set ingress.hosts[0].paths[0].path=/ \
            --set ingress.hosts[0].paths[0].pathType=Prefix \
            | grep -q "kind: Ingress"

          $base --set podDisruptionBudget.enabled=true | grep -q "kind: PodDisruptionBudget"

          $base --set networkPolicy.enabled=true | grep -q "kind: NetworkPolicy"

      - name: helm template (webhook keys render)
        run: |
          set -e
          helm template seasonfill-test deploy/helm/seasonfill \
            -f /tmp/values-ci.yaml > /tmp/render-webhook.yaml
          grep -q "SEASONFILL_WEBHOOK_SECRET" /tmp/render-webhook.yaml
          grep -q "allowed_instances:" /tmp/render-webhook.yaml
          grep -E '^\s+- "main"$' /tmp/render-webhook.yaml

          # webhookOnly Ingress collapses paths to /api/v1/webhook.
          helm template seasonfill-test deploy/helm/seasonfill \
            -f /tmp/values-ci.yaml \
            --set ingress.enabled=true --set ingress.webhookOnly=true \
            --set ingress.hosts[0].host=seasonfill.example.com \
            | grep -q "path: /api/v1/webhook"

          # NetworkPolicy webhookSources adds the second ingress rule.
          helm template seasonfill-test deploy/helm/seasonfill \
            -f /tmp/values-ci.yaml \
            --set networkPolicy.enabled=true \
            --set 'networkPolicy.webhookSources[0].namespaceSelector.matchLabels.kubernetes\.io/metadata\.name=sonarr' \
            | grep -q "kubernetes.io/metadata.name: sonarr"

      - name: helm template (PVC absent in postgres mode even with persistence on)
        run: |
          helm template seasonfill-test deploy/helm/seasonfill \
            -f /tmp/values-ci.yaml \
            --set config.database.driver=postgres \
            --set secrets.postgresDSN=postgres://x \
            --set persistence.enabled=true \
            > /tmp/render-pg.yaml
          ! grep -q "kind: PersistentVolumeClaim" /tmp/render-pg.yaml

      - name: helm template (web fan-out renders)
        run: |
          set -e
          base="helm template seasonfill-test deploy/helm/seasonfill -f /tmp/values-ci.yaml"

          # Default: no web Deployment, no web Service, no fan-out.
          $base > /tmp/render-no-web.yaml
          ! grep -E "name: seasonfill-test-web$" /tmp/render-no-web.yaml

          # web.enabled=true: second Deployment + Service + ConfigMap appear.
          $base --set web.enabled=true > /tmp/render-web.yaml
          grep -q "name: seasonfill-test-web$" /tmp/render-web.yaml
          grep -cE "^kind: Deployment$" /tmp/render-web.yaml | grep -q "^2$"
          grep -cE "^kind: Service$" /tmp/render-web.yaml | grep -q "^2$"
          grep -q "kind: ConfigMap" /tmp/render-web.yaml

          # Fan-out Ingress: backend prefix list + / catch-all.
          $base --set web.enabled=true \
            --set ingress.enabled=true --set ingress.web.enabled=true \
            --set ingress.hosts[0].host=seasonfill.example.com \
            > /tmp/render-fanout.yaml
          grep -q "path: /api" /tmp/render-fanout.yaml
          grep -q "path: /webhook" /tmp/render-fanout.yaml
          grep -q "path: /healthz" /tmp/render-fanout.yaml
          grep -q "path: /readyz" /tmp/render-fanout.yaml
          grep -q "path: /metrics" /tmp/render-fanout.yaml
          grep -q "path: /$" /tmp/render-fanout.yaml
          # Order check: every backend prefix must appear BEFORE the
          # `/` catch-all line. Capture line numbers, compare.
          slash_line=$(grep -n "path: /$" /tmp/render-fanout.yaml | head -1 | cut -d: -f1)
          for p in "path: /api" "path: /webhook" "path: /healthz" "path: /readyz" "path: /metrics"; do
            pline=$(grep -n "$p" /tmp/render-fanout.yaml | head -1 | cut -d: -f1)
            [ "$pline" -lt "$slash_line" ] || { echo "Path '$p' appears after / catch-all"; exit 1; }
          done

          # Mutual exclusivity: webhookOnly + web.enabled fails.
          if $base --set web.enabled=true \
            --set ingress.enabled=true --set ingress.web.enabled=true \
            --set ingress.webhookOnly=true \
            --set ingress.hosts[0].host=seasonfill.example.com 2>&1 | grep -q "mutually exclusive"; then
            echo "Mutual-exclusivity guard fired as expected."
          else
            echo "Expected mutual-exclusivity error not raised."
            exit 1
          fi
