name: CI

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.4"
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2

  unit:
    name: Unit
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.4"
          cache: true

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test (unit)
        run: |
          PKGS=$(go list ./... | grep -v '/cmd/')
          go test -short -race -timeout 5m -coverprofile=coverage.out $PKGS

      - name: Coverage
        run: go tool cover -func=coverage.out | tail -1

      - name: Coverage gate
        run: |
          PCT=$(go tool cover -func=coverage.out | tail -1 | awk '{print $3}' | sed 's/%//')
          echo "Total coverage: ${PCT}%"
          awk "BEGIN { exit !(${PCT} >= 75) }" || (echo "Coverage below 75%"; exit 1)

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-unit
          path: coverage.out

  openapi:
    name: OpenAPI drift
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.4"
          cache: true
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package.json
      - name: Install module tools
        run: go install tool
      - name: Drift check
        run: make openapi-check

  integration-sqlite:
    name: Integration (SQLite)
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.4"
          cache: true

      - name: Test (integration, sqlite only)
        run: |
          PKGS=$(go list ./... | grep -v '/cmd/')
          go test -tags integration -race -timeout 15m $PKGS

  integration-postgres:
    name: Integration (Postgres via services container)
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')))
    runs-on: ubuntu-latest
    # GitHub Actions service container shared across all packages in this job.
    # Switched from per-process testcontainers (sync.Once-per-test-binary) because
    # `go test ./pkgA ./pkgB` spawns one process per package; each process booted
    # and then terminated its own container, leaving later packages with a stale
    # cached port and "connection refused". One services container shared across
    # the job sidesteps the lifecycle entirely. Per-test DB isolation is preserved
    # by testhelpers.PostgresContainer.NewDB which CREATEs a fresh
    # `seasonfill_test_<rand>` database per call.
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: seasonfill
          POSTGRES_PASSWORD: seasonfill
          POSTGRES_DB: seasonfill_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U seasonfill -d seasonfill_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.4"
          cache: true

      - name: Test (integration, postgres backend)
        env:
          SEASONFILL_TEST_POSTGRES_ENABLE: "1"
          SEASONFILL_TEST_POSTGRES_DSN: "postgres://seasonfill:seasonfill@localhost:5432/seasonfill_test?sslmode=disable"
          GOMAXPROCS: "4"
        run: |
          PKGS=$(go list ./internal/shared/testhelpers ./infrastructure/database/repositories/...)
          go test -tags integration -race -timeout 20m -parallel=4 $PKGS

  nightly-deep:
    name: Nightly deep
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.4"
          cache: true

      - name: Test (integration + e2e)
        run: |
          PKGS=$(go list ./... | grep -v '/cmd/')
          go test -tags "integration integration_e2e" -race -timeout 30m -coverprofile=coverage-deep.out $PKGS

      - name: Coverage summary
        if: always()
        run: |
          if [ -f coverage-deep.out ]; then
            go tool cover -func=coverage-deep.out | tail -1
          fi

      - name: Upload nightly coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-nightly
          path: coverage-deep.out
          if-no-files-found: ignore

  vuln:
    name: Vuln Scan
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.4"
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        run: cd web && npm ci

      - name: Run vulnerability scanners
        run: make vuln

  docker:
    name: Docker
    runs-on: ubuntu-latest
    needs: [lint, unit, integration-sqlite, integration-postgres, openapi, vuln]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,format=short
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deploy/docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-web:
    name: Build web image
    runs-on: ubuntu-latest
    needs: [lint, unit, integration-sqlite, integration-postgres, openapi, vuln]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          # Same owner, distinct repo path: `<owner>/<repo>-web`.
          images: ghcr.io/${{ github.repository }}-web
          tags: |
            type=sha,format=short
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Compute app version label
        id: appver
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_SHA:0:7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: web
          file: web/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_APP_VERSION=${{ steps.appver.outputs.version }}
            GIT_SHA=${{ github.sha }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max
