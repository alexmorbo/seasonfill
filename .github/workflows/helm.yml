name: Helm chart

on:
  pull_request:
    paths:
      - "deploy/helm/**"
      - ".github/workflows/helm.yml"
  push:
    branches: [main]
    paths:
      - "deploy/helm/**"
      - ".github/workflows/helm.yml"

permissions:
  contents: read

concurrency:
  group: helm-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Lint + template + schema
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: v3.16.4

      - name: helm lint (prod-like values)
        run: |
          helm lint deploy/helm/seasonfill \
            -f deploy/helm/seasonfill/ci/values-test.yaml

      - name: helm template (renders cleanly)
        run: |
          mkdir -p /tmp/render
          helm template seasonfill-test deploy/helm/seasonfill \
            -f deploy/helm/seasonfill/ci/values-test.yaml \
            > /tmp/render/all.yaml

      - name: helm template (dev path — inline apiKey, no existingSecret)
        run: |
          helm template seasonfill-test deploy/helm/seasonfill \
            -f deploy/helm/seasonfill/ci/values-dev.yaml \
            > /dev/null

      - name: Schema negative — webPassword AND webPasswordHash both set
        run: |
          # Schema rule: not(allOf(webPassword non-empty, webPasswordHash non-empty)).
          if helm template seasonfill-test deploy/helm/seasonfill \
              -f deploy/helm/seasonfill/ci/values-dev.yaml \
              --set 'secrets.webPasswordHash=$2b$10$abc' \
              2>/dev/null; then
            echo "Expected schema failure: webPassword and webPasswordHash both set"
            exit 1
          fi
          echo "Schema correctly rejected mutex violation."

      - name: Install kubeconform
        run: |
          KUBECONFORM_VERSION=0.6.7
          curl -sSL -o /tmp/kubeconform.tar.gz \
            "https://github.com/yannh/kubeconform/releases/download/v${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz"
          tar -xzf /tmp/kubeconform.tar.gz -C /tmp kubeconform
          sudo mv /tmp/kubeconform /usr/local/bin/kubeconform
          kubeconform -v

      - name: kubeconform (rendered manifests valid against k8s 1.28)
        run: |
          kubeconform \
            -strict \
            -summary \
            -kubernetes-version 1.28.0 \
            -schema-location default \
            -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
            /tmp/render/all.yaml
