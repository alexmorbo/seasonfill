version: 2
updates:
  # Backend Go modules. Single go.mod at repo root.
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    groups:
      minor-patch:
        update-types: [minor, patch]
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"

  # Frontend npm. web/package.json.
  - package-ecosystem: npm
    directory: "/web"
    schedule:
      interval: weekly
      day: monday
    groups:
      minor-patch:
        update-types: [minor, patch]
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"

  # GitHub Actions versions. Dependabot scans all .github/workflows/*.yml.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(ci)"

  # Backend Dockerfile.
  - package-ecosystem: docker
    directory: "/deploy/docker"
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore(docker)"

  # Frontend Dockerfile.
  - package-ecosystem: docker
    directory: "/web"
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore(docker)"
